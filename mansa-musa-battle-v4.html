const LANE = {

  topHalfW: 46,
  baseHalfW: 190,
  centerX: GAME_W / 2,
  crowdY: GAME_H - 170, // crowd anchor row — where arrows launch and enemies make contact

/* Map a screen Y to a perspective scale (small far away, large up close). */
function depthScale(y) {
  const t = Phaser.Math.Clamp((y - LANE.topY) / (LANE.baseY - LANE.topY), 0, 1);
  return Phaser.Math.Linear(0.45, 1.15, t);
}

/* Half-width of the drivable road at a given screen Y. */
function laneHalfWidth(y) {
  const t = Phaser.Math.Clamp((y - LANE.topY) / (LANE.baseY - LANE.topY), 0, 1);
  return Phaser.Math.Linear(LANE.topHalfW, LANE.baseHalfW, t);
}

  enemyClusterSize: 9, // a wave streams down as clusters of ~this many raiders

  enemySpeedMul: 1.12, // enemies a touch faster than barrels: telegraph gap shrinks slowly, DPS race bites

  arrow: { speed: 440, lifespanMs: 2600 },

    // DPS = unitCount × spread × fireRate. Each unit looses `spread` arrows/volley; rapid

    baseInterval: 480, // ms between volleys at rate tier 0

  barrelSpeedMul: 1.0,

  telegraphGap: 230,

  barrelReachDmg: 0.5,

const enc = (dist, left, right, wave) => ({ type: 'encounter', dist, left, right, wave });

/* ===== systems/juice.js ===== */
/*
 * juice.js — Tiny reusable "game feel" helpers: screen shake, hit flash, particle
 * bursts, gold sparkle, and floating pop text. Scenes call these; they own no state.
 */


const Juice = {
  shake(scene, intensity = 0.006, dur = 150) {
    scene.cameras.main.shake(dur, intensity);
  },

  flash(scene, color = 0xffffff, dur = 90, alpha = 0.5) {
    scene.cameras.main.flash(dur, (color >> 16) & 255, (color >> 8) & 255, color & 255, false, null, alpha);
  },

  /* A short outward burst of `n` particles in `color`. */
  burst(scene, x, y, color = PALETTE.gold, n = 12, spd = 160) {
    const e = scene.add.particles(x, y, 'spark', {
      speed: { min: spd * 0.4, max: spd },
      angle: { min: 0, max: 360 },
      scale: { start: 0.7, end: 0 },
      alpha: { start: 1, end: 0 },
      lifespan: { min: 250, max: 520 },
      quantity: n,
      tint: color,
      blendMode: 'ADD',
      emitting: false,
    });
    e.setDepth(900);
    e.explode(n);
    scene.time.delayedCall(700, () => e.destroy());
    return e;
  },

  /* Persistent gentle sparkle (e.g. on a chest or the crowd when huge). */
  sparkle(scene, x, y, color = PALETTE.goldLight) {
    const e = scene.add.particles(x, y, 'spark', {
      speed: { min: 6, max: 24 },
      scale: { start: 0.35, end: 0 },
      alpha: { start: 0.9, end: 0 },
      lifespan: 600,
      frequency: 120,
      tint: color,
      blendMode: 'ADD',
    });
    e.setDepth(890);
    return e;
  },

  /* Floating text that rises and fades — for "x2", "+10", "-5", combat numbers. */
  popText(scene, x, y, text, color = '#ffffff', size = 30) {
    const t = scene.add.text(x, y, text, {
      fontFamily: 'Georgia, "Times New Roman", serif',
      fontSize: size + 'px',
      fontStyle: 'bold',
      color,
      stroke: '#2a1c0c',
      strokeThickness: 5,
    });
    t.setOrigin(0.5).setDepth(950).setScale(0.2);
    scene.tweens.add({ targets: t, scale: 1, duration: 180, ease: 'Back.out' });
    scene.tweens.add({
      targets: t,
      y: y - 70,
      alpha: 0,
      duration: 900,
      delay: 160,
      ease: 'Cubic.in',
      onComplete: () => t.destroy(),
    });
    return t;
  },

  /* A scale "punch" on any game object — the satisfying multiply pop. */
  punch(scene, obj, amt = 1.25, dur = 160) {
    const sx = obj.scaleX, sy = obj.scaleY;
    scene.tweens.add({
      targets: obj,
      scaleX: sx * amt,
      scaleY: sy * amt,
      duration: dur * 0.4,
      yoyo: true,
      ease: 'Quad.out',
      onComplete: () => obj.setScale(sx, sy),
    });
  },
};


/* ===== systems/audio.js ===== */
/*
 * audio.js — Zero-asset sound via the Web Audio API. Returns a single sfx(name) fn so
 * scenes can call this.sfx('pop'). Synthesized blips keep the build self-contained;
 * swap for sampled audio later if desired. Audio context unlocks on first user gesture.
 */
function makeSfx() {
  let ctx = null;
  const ensure = () => {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { ctx = null; }
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
    return ctx;
  };

  function tone(freq, dur, type = 'sine', gain = 0.12, slideTo = null) {
    const c = ensure();
    if (!c) return;
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, c.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, c.currentTime + dur);
    g.gain.setValueAtTime(gain, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    o.connect(g).connect(c.destination);
    o.start();
    o.stop(c.currentTime + dur + 0.02);
  }

  const fns = {
    pop: () => tone(440, 0.16, 'triangle', 0.16, 880),
    weapon: () => { tone(330, 0.12, 'square', 0.1); setTimeout(() => tone(660, 0.16, 'square', 0.1), 70); },
    clash: () => tone(120, 0.1, 'sawtooth', 0.14, 70),
    hit: () => tone(200, 0.07, 'square', 0.08, 120),
    coin: () => tone(880, 0.1, 'sine', 0.12, 1320),
    twang: () => tone(680, 0.09, 'triangle', 0.06, 240), // bowstring release / whoosh
    thunk: () => tone(180, 0.06, 'square', 0.05, 90), // arrow biting wood
    smash: () => { tone(150, 0.18, 'sawtooth', 0.14, 60); setTimeout(() => tone(90, 0.16, 'square', 0.1), 40); },
    win: () => { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 0.22, 'triangle', 0.14), i * 110)); },
    lose: () => { [440, 330, 220].forEach((f, i) => setTimeout(() => tone(f, 0.28, 'sawtooth', 0.12), i * 130)); },
    gate: () => tone(520, 0.08, 'sine', 0.07, 720),
  };

  return (name) => { try { (fns[name] || (() => {}))(); } catch (e) {} };
}


/* ===== systems/textures.js ===== */
/*
 * textures.js — All placeholder art is generated procedurally at boot so the build
 * stays self-contained (no binary assets to ship to Workers static hosting).
 *
 * Readable silhouettes are the priority: player = blue-robed figure with a gold cap,
 * enemy = red raider, plus chests, crystals, gate posts, particles. Swap this module
 * to reskin an era without touching gameplay.
 */


function figure(g, bodyColor, trimColor, capColor) {
  // 28x40 little marcher with a clear head/body silhouette + shadow.
  g.clear();
  g.fillStyle(0x000000, 0.18);
  g.fillEllipse(14, 38, 20, 7); // ground shadow
  // body / robe (trapezoid)
  g.fillStyle(bodyColor, 1);
  g.fillTriangle(14, 14, 4, 36, 24, 36);
  g.fillRect(8, 20, 12, 16);
  // trim sash
  g.fillStyle(trimColor, 1);
  g.fillRect(8, 26, 12, 3);
  // head
  g.fillStyle(0x6b4a2a, 1);
  g.fillCircle(14, 11, 6);
  // cap
  g.fillStyle(capColor, 1);
  g.fillEllipse(14, 7, 13, 7);
  g.fillRect(8, 6, 12, 3);
}

function buildTextures(scene) {
  const g = scene.make.graphics({ x: 0, y: 0, add: false });

  // Player unit
  figure(g, PALETTE.player, PALETTE.playerTrim, PALETTE.gold);
  g.generateTexture('unit', 28, 42);

  // Enemy unit
  figure(g, PALETTE.enemy, PALETTE.enemyTrim, PALETTE.enemyTrim);
  g.generateTexture('foe', 28, 42);

  // Gold chest
  g.clear();
  g.fillStyle(0x000000, 0.18);
  g.fillEllipse(20, 30, 30, 8);
  g.fillStyle(PALETTE.goldDeep, 1);
  g.fillRoundedRect(4, 12, 32, 20, 4);
  g.fillStyle(PALETTE.gold, 1);
  g.fillRoundedRect(4, 8, 32, 10, 4);
  g.fillStyle(PALETTE.goldLight, 1);
  g.fillRect(18, 8, 4, 24);
  g.fillStyle(0xfff4cf, 1);
  g.fillCircle(20, 20, 2.5);
  g.generateTexture('chest', 40, 36);

  // Crystal
  g.clear();
  g.fillStyle(0x000000, 0.16);
  g.fillEllipse(14, 30, 20, 6);
  g.fillStyle(PALETTE.crystal, 1);

  // Arrow (bow shaft + head + fletching), pointing UP. v3: longer + clearer so it reads in

  g.fillRect(7, 34, 2, 8);

  g.fillEllipse(24, 22, 44, 18);
  g.generateTexture('dune', 48, 32);

  g.destroy();
}


/* ===== systems/Lane.js ===== */
/*
 * Lane.js — The painted 2.5D backdrop: warm sky, a receding trapezoid road with a
 * vanishing point near the horizon, desert sand + green flanks, and scrolling props
 * (acacia trees, dunes) that stream down and scale with perspective to fake depth.
 *
 * This is the "2.5D" of the brief: flat art + perspective scaling + a painted lane —
 * NOT top-down, NOT real 3D.
 */


class Lane {
  constructor(scene) {
    this.scene = scene;
    this.props = [];
    this.spawnAccum = 0;
    this._paintStatic();
  }

  _paintStatic() {
    const s = this.scene;
    const g = s.add.graphics().setDepth(0);

    // Sky gradient (banded fills — warm gold to pale).
    const bands = 10;
    for (let i = 0; i < bands; i++) {
      const t = i / (bands - 1);
      const c = Phaser.Display.Color.Interpolate.ColorWithColor(
        Phaser.Display.Color.ValueToColor(PALETTE.skyTop),
        Phaser.Display.Color.ValueToColor(PALETTE.sky),
        bands - 1,
        i
      );
      g.fillStyle(Phaser.Display.Color.GetColor(c.r, c.g, c.b), 1);
      g.fillRect(0, (LANE.topY * t) | 0, GAME_W, Math.ceil(LANE.topY / bands) + 1);
    }
    // Sun disc near the horizon.
    g.fillStyle(0xfff0c0, 0.85);
    g.fillCircle(GAME_W / 2, LANE.topY - 30, 46);
    g.fillStyle(0xffe49a, 0.5);
    g.fillCircle(GAME_W / 2, LANE.topY - 30, 64);

    // Ground: split desert (sand) flanks + green near the road.
    g.fillStyle(PALETTE.sand, 1);
    g.fillRect(0, LANE.topY, GAME_W, GAME_H - LANE.topY);
    // green band closer to viewer (savanna)
    g.fillStyle(PALETTE.green, 0.35);
    g.fillTriangle(0, GAME_H, 0, GAME_H - 360, GAME_W, GAME_H);
    g.fillTriangle(GAME_W, GAME_H, GAME_W, GAME_H - 360, 0, GAME_H);

    // The road trapezoid (vanishing at top).
    const cx = LANE.centerX;
    g.fillStyle(PALETTE.roadEdge, 1);
    g.fillPoints(
      [
        { x: cx - LANE.topHalfW - 8, y: LANE.topY },
        { x: cx + LANE.topHalfW + 8, y: LANE.topY },
        { x: cx + LANE.baseHalfW + 14, y: GAME_H },
        { x: cx - LANE.baseHalfW - 14, y: GAME_H },
      ],
      true
    );
    g.fillStyle(PALETTE.road, 1);
    g.fillPoints(
      [
        { x: cx - LANE.topHalfW, y: LANE.topY },
        { x: cx + LANE.topHalfW, y: LANE.topY },
        { x: cx + LANE.baseHalfW, y: GAME_H },
        { x: cx - LANE.baseHalfW, y: GAME_H },
      ],
      true
    );

    // Dashed center line for a sense of motion reference.
    g.fillStyle(PALETTE.goldLight, 0.45);
    for (let i = 0; i < 9; i++) {
      const t0 = i / 9, t1 = t0 + 0.045;
      const y0 = Phaser.Math.Linear(LANE.topY, GAME_H, t0);
      const y1 = Phaser.Math.Linear(LANE.topY, GAME_H, t1);
      const w0 = Phaser.Math.Linear(2, 9, t0);
      const w1 = Phaser.Math.Linear(2, 9, t1);
      g.fillPoints(
        [
          { x: cx - w0, y: y0 }, { x: cx + w0, y: y0 },
          { x: cx + w1, y: y1 }, { x: cx - w1, y: y1 },
        ],
        true
      );
    }
    this.staticG = g;

    // Soft vignette to focus the eye.
    const v = s.add.graphics().setDepth(820);
    v.fillStyle(0x2a1c0c, 0.0);
    v.fillStyle(0x000000, 0.16);
    v.fillRect(0, 0, GAME_W, 60);
    v.fillRect(0, GAME_H - 90, GAME_W, 90);
    this.vignette = v;
  }

  /* Spawn a flank prop just past the road edge at the horizon; it scrolls toward us. */
  _spawnProp() {
    const left = Math.random() < 0.5;
    const kind = Math.random() < 0.5 ? 'tree' : 'dune';
    const p = this.scene.add.image(0, LANE.topY + 4, kind).setOrigin(0.5, 0.95).setDepth(50);
    p.side = left ? -1 : 1;
    p.spread = Phaser.Math.FloatBetween(1.15, 2.2); // how far off-road
    this.props.push(p);
  }

  update(dt, scrollPx) {
    // Trickle in props.
    this.spawnAccum += scrollPx;
    if (this.spawnAccum > 70) { this.spawnAccum = 0; this._spawnProp(); }

    for (let i = this.props.length - 1; i >= 0; i--) {
      const p = this.props[i];
      p.y += scrollPx;
      const sc = depthScale(p.y);
      const t = Phaser.Math.Clamp((p.y - LANE.topY) / (GAME_H - LANE.topY), 0, 1);
      const roadHalf = Phaser.Math.Linear(LANE.topHalfW, LANE.baseHalfW, t);
      p.x = LANE.centerX + p.side * (roadHalf + p.spread * 60 * sc);
      p.setScale(sc * 1.4).setDepth(50 + p.y * 0.1);
      if (p.y > GAME_H + 60) { p.destroy(); this.props.splice(i, 1); }
    }
  }
}


/* ===== entities/Crowd.js ===== */
/*
 * Crowd.js — The player's marching column. Owns the logical unit `count`, the visible
 * unit sprites (capped at BALANCE.renderCap), formation packing, steering, the bobbing
 * march animation, weapon tier, and the grow/shrink "pop".
 *
 * The crowd holds a fixed band on screen (LANE.crowdY); the world scrolls past it.
 * Steering only changes centerX. depthScale handles the 2.5D up-close sizing.
 */



class Crowd {
  constructor(scene, count) {
    this.scene = scene;
    this.count = count;
    this.centerX = LANE.centerX;
    this.targetX = LANE.centerX;
    // v4 weapon progression: spread (arrows/unit, 1→3) then rate tier (Rapid I/II/III).
    this.spread = 1;
    this.rateTier = 0;
    this.units = []; // sprite pool
    this.t = 0; // time accumulator for bob

    this.layer = scene.add.container(0, 0).setDepth(500);

    // Count badge that floats above the blob.
    this.badge = scene.add
      .text(this.centerX, LANE.crowdY - 64, String(count), {
        fontFamily: 'Georgia, serif',
        fontSize: '34px',
        fontStyle: 'bold',
        color: '#ffffff',
        stroke: '#1d3a5c',
        strokeThickness: 6,
      })
      .setOrigin(0.5)
      .setDepth(700);

    this.sync(true);
  }

  /* Persistent in-blob offset for unit i. Spiral packing keeps it tidy as it grows. */
  slot(i) {
    const golden = 2.399963; // golden angle → even disk packing
    const r = 9 * Math.sqrt(i);
    const a = i * golden;
    return { ox: Math.cos(a) * r, oy: Math.sin(a) * r * 0.55 };
  }

  /* Reconcile sprite pool with logical count (capped), animating pops. */
  sync(instant = false) {
    const target = Math.min(this.count, BALANCE.renderCap);
    while (this.units.length < target) {
      const i = this.units.length;
      const s = this.scene.add.image(0, 0, 'unit').setOrigin(0.5, 0.9);
      s.slot = this.slot(i);
      s.bob = Math.random() * Math.PI * 2;
      this.layer.add(s);
      this.units.push(s);
      if (!instant) {
        s.setScale(0.1);
        this.scene.tweens.add({ targets: s, scale: 1, duration: 220, ease: 'Back.out' });
      }
    }
    while (this.units.length > target) {
      const s = this.units.pop();
      if (instant) { s.destroy(); continue; }
      this.scene.tweens.add({
        targets: s, scale: 0, alpha: 0, duration: 200, ease: 'Quad.in',
        onComplete: () => s.destroy(),
      });
    }
    this.badge.setText(String(Math.max(0, Math.round(this.count))));
  }

  setTargetX(x) {
    // v3: comfortable full-lane range so you can line the crowd up under any barrel.
    const hw = laneHalfWidth(LANE.crowdY) - 14;
    this.targetX = Phaser.Math.Clamp(x, LANE.centerX - hw, LANE.centerX + hw);
  }

  get alive() { return this.count > 0; }

  /* Apply a barrel reward and play the juice. Returns the new count.
   * CROWD rewards (add/sub/mul) change unit count; WEAPON rewards (op:'arrow')
   * change the weapon (spread→rate). DPS = count × spread × fireRate, so the two combine. */
  applyOp(op, x, y) {
    if (op.op === 'arrow') { this.applyArrow(op, x, y); return this.count; }

    const before = this.count;
    if (op.op === 'add') this.count += op.v;
    else if (op.op === 'sub') this.count = Math.max(0, this.count - op.v);
    else if (op.op === 'mul') this.count = Math.round(this.count * op.v);

    const good = this.count >= before && op.op !== 'sub';
    const label = op.op === 'add' ? `+${op.v}` : op.op === 'sub' ? `-${op.v}` : `x${op.v}`;
    Juice.popText(this.scene, x, y - 30, label, good ? '#ffe9a8' : '#ff8d7a', 38);
    if (good) {
      Juice.burst(this.scene, this.centerX, LANE.crowdY - 20, PALETTE.goldLight, 18, 220);
      Juice.flash(this.scene, 0xffe9a8, 80, 0.25);
      Juice.punch(this.scene, this.badge, 1.5);
      this.scene.sfx && this.scene.sfx('pop');
    } else if (op.op === 'sub') {
      Juice.burst(this.scene, this.centerX, LANE.crowdY - 20, 0xff6b52, 14, 200);
      Juice.shake(this.scene, 0.004, 120);
    }
    this.sync();
    return this.count;
  }

  /* Weapon barrel: advance one (or `step`) weapon step — fill SPREAD up to 3, then RATE. */
  applyArrow(op, x, y) {
    const steps = op.step || 1;
    for (let i = 0; i < steps; i++) {
      if (this.spread < BALANCE.maxSpread) this.spread++;
      else this.rateTier = Math.min(BALANCE.maxRateTier, this.rateTier + 1);
    }
    const color = this.weaponColor();
    Juice.popText(this.scene, x, y - 30, 'WEAPON+', '#9be8ff', 32);
    Juice.popText(this.scene, this.centerX, LANE.crowdY - 74, this.weaponLabel(), '#bff4ff', 22);
    Juice.burst(this.scene, this.centerX, LANE.crowdY - 20, color, 24, 260);
    Juice.flash(this.scene, color, 110, 0.3);
    this.scene.sfx && this.scene.sfx('weapon');
  }

  /* Readable weapon state: "1 ARROW", "3 ARROWS", then "RAPID I/II/III". */
  weaponLabel() {
    if (this.rateTier > 0) return 'RAPID ' + ['I', 'II', 'III', 'IV'][this.rateTier - 1];
    return this.spread + (this.spread === 1 ? ' ARROW' : ' ARROWS');
  }
  weaponStep() { return (this.spread - 1) + this.rateTier; } // 0..(2+maxRate)
  weaponColor() { return BALANCE.weaponColors[Math.min(this.weaponStep(), BALANCE.weaponColors.length - 1)]; }

  /* Remove n units (combat losses) with a poof. */
  takeLosses(n) {
    this.count = Math.max(0, this.count - n);
    this.sync();
    if (this.count > 0) Juice.shake(this.scene, 0.003, 90);
  }

  update(dt) {
    this.t += dt;
    this.centerX = Phaser.Math.Linear(this.centerX, this.targetX, BALANCE.steerLerp);
    const sc = depthScale(LANE.crowdY);
    for (const s of this.units) {
      s.bob += dt * 0.012;
      const bob = Math.sin(s.bob) * 2.2;
      s.x = this.centerX + s.slot.ox * sc;
      s.y = LANE.crowdY + s.slot.oy * sc + bob;
      s.setScale(sc);
      s.setDepth(500 + s.y * 0.1);
    }
    this.badge.x = this.centerX;
    this.badge.y = LANE.crowdY - 58 - Math.min(40, Math.sqrt(this.count) * 4);
  }

  destroy() {
    this.layer.destroy();
    this.badge.destroy();
  }
}


/* ===== entities/Barrel.js ===== */
/*
 * Barrel.js — A destructible reward keg that rolls DOWN the lane toward the crowd.
 *
 * Shows two numbers: HP (arrow hits left to destroy it, ticks down as arrows bite) and a
 * REWARD label (x10 / x2 / +25 / ARROWS+) applied to the crowd when it breaks. Destroy it
 * with arrows BEFORE it reaches the crowd → reward fires (the multiply pop). If it reaches
 * the crowd alive, it smashes into them and costs units. Barrels spawn singly or in pairs
 * (steer to choose which to focus); the un-focused one chips you — the greedy-vs-safe core.
 *
 * The scene owns reward/chip application (it has the crowd + juice); this entity owns its
 * HP, art, descent, perspective scaling, and hit feedback.
 */



// Weapon barrels (op:'arrow') read blue/crystal with an arrow icon; crowd barrels read
// gold/green — so the two upgrade paths are instantly distinguishable on the lane.
const isWeapon = (r) => r.op === 'arrow';
const rewardColor = (r) =>
  isWeapon(r) ? PALETTE.crystal : r.op === 'mul' ? PALETTE.green : PALETTE.gold;
const rewardLabel = (r) =>
  isWeapon(r) ? 'WEAPON+' : r.op === 'mul' ? `x${r.v}` : `+${r.v}`;

class Barrel {
  constructor(scene, side, hp, reward) {
    this.scene = scene;
    this.side = side; // 'L' | 'C' | 'R'
    this.hp = hp;
    this.hpMax = hp;
    this.reward = reward;
    this.y = -50;
    this.dead = false;
    this.done = false;
    this.rewarded = false;
    this.sibling = null; // the other keg in a CHOICE pair — breaking one dismisses the other

    this.isWeapon = isWeapon(reward);
    this.sprite = scene.add.image(0, 0, 'barrel').setOrigin(0.5, 0.85).setDepth(330);
    if (this.isWeapon) this.sprite.setTint(0x6fb6d6); // steel-blue armory keg

    // Reward banner on the body.
    this.rewardTxt = scene.add
      .text(0, 0, rewardLabel(reward), {
        fontFamily: 'Georgia, serif', fontSize: this.isWeapon ? '15px' : '17px', fontStyle: 'bold',
        color: this.isWeapon ? '#dff6ff' : '#fff', stroke: hex(PALETTE.ink), strokeThickness: 4,
      })
      .setOrigin(0.5)
      .setDepth(332);

    // HP chip above the barrel.
    this.hpBg = scene.add.circle(0, 0, 15, rewardColor(reward), 0.95).setStrokeStyle(2.5, PALETTE.ink).setDepth(333);
    this.hpTxt = scene.add
      .text(0, 0, String(hp), {
        fontFamily: 'Georgia, serif', fontSize: '18px', fontStyle: 'bold',
        color: '#fff', stroke: hex(PALETTE.ink), strokeThickness: 3,
      })
      .setOrigin(0.5)
      .setDepth(334);
  }

  /* Current lane X for this barrel's side at its current depth. */
  get x() {
    const half = laneHalfWidth(this.y);
    if (this.side === 'L') return LANE.centerX - half * 0.42;
    if (this.side === 'R') return LANE.centerX + half * 0.42;
    return LANE.centerX;
  }

  /* One arrow bites the barrel. Returns true if this hit destroyed it. */
  hit() {
    if (this.dead) return false;
    this.hp -= 1;
    this.hpTxt.setText(String(Math.max(0, this.hp)));
    Juice.punch(this.scene, this.hpBg, 1.3, 90);
    this.scene.tweens.add({ targets: this.sprite, x: this.sprite.x + Phaser.Math.Between(-2, 2), duration: 40, yoyo: true });
    this.sprite.setTintFill(0xffffff);
    this.scene.time.delayedCall(40, () => {
      if (!this.sprite) return;
      if (this.isWeapon) this.sprite.setTint(0x6fb6d6); else this.sprite.clearTint();
    });
    Juice.burst(this.scene, this.sprite.x, this.y - 20 * depthScale(this.y), 0xcaa15a, 4, 90);
    if (this.hp <= 0) { this.dead = true; return true; }
    return false;
  }

  update(dt, scrollPx) {
    this.y += scrollPx;
    const sc = depthScale(this.y) * 1.15;
    const x = this.x;
    this.sprite.setPosition(x, this.y).setScale(sc).setDepth(330 + this.y * 0.1);
    this.rewardTxt.setPosition(x, this.y - 22 * sc).setScale(Phaser.Math.Clamp(sc, 0.7, 1.2));
    this.hpBg.setPosition(x, this.y - 48 * sc).setScale(Phaser.Math.Clamp(sc, 0.7, 1.2));
    this.hpTxt.setPosition(x, this.y - 48 * sc).setScale(Phaser.Math.Clamp(sc, 0.7, 1.2));
  }

  /* v3 alignment hit-test: an arrow hits only if it crosses this row within this x half-width. */
  get hitRowY() { return this.y - 24 * depthScale(this.y) * 1.15; }
  get hitHalfX() { return (44 * depthScale(this.y) * 1.15) / 2 + 9; }

  get reachedCrowd() { return this.y >= LANE.crowdY - 8; }

  /* The unchosen keg of a pair: fade away with no effect (the choice is exclusive). */
  dismiss() {
    if (this.done) return;
    this.done = true;
    const objs = [this.sprite, this.rewardTxt, this.hpBg, this.hpTxt];
    this.scene.tweens.add({
      targets: objs, alpha: 0, duration: 220, ease: 'Quad.out',
      onComplete: () => objs.forEach((o) => o && o.destroy()),
    });
  }

  destroy() {
    this.sprite.destroy();
    this.rewardTxt.destroy();
    this.hpBg.destroy();
    this.hpTxt.destroy();
  }
}


/* ===== entities/EnemyFormation.js ===== */
/*
 * EnemyFormation.js — A wave (or the boss) of raiders advancing DOWN the lane as TARGETS.
 *
 * v3 combat: your straight-up arrows kill them on x-overlap (each enemy = `hpPerEnemy` hits,
 * 1–3). The block keeps advancing; whatever survives to your column collides and removes an
 * EQUAL number of your units (1-for-1). So: out-DPS the wave before contact, or get gutted.
 * The boss is just a very large block. Spawns at a lane side so you must steer to mow it.
 */


class EnemyFormation {
  constructor(scene, count, label, isBoss = false, side = 'C', y0 = -60) {
    this.scene = scene;
    this.count = count;
    this.maxCount = count;
    this.hpPerEnemy = isBoss ? 3 : BALANCE.enemyHpPerUnit; // arrow hits to kill one raider
    this.hp = count * this.hpPerEnemy;
    this.label = label || 'Raiders';
    this.isBoss = isBoss;
    this.side = side;
    this.y = y0; // clusters stagger by starting higher up the lane
    this.units = [];
    this.dead = false;
    this.t = 0;

    this.layer = scene.add.container(0, 0).setDepth(450);

    this.barBg = scene.add.rectangle(0, 0, 120, 12, 0x2a1c0c, 0.85).setOrigin(0.5).setDepth(640);
    this.bar = scene.add.rectangle(0, 0, 116, 8, PALETTE.enemy).setOrigin(0, 0.5).setDepth(641);
    this.badge = scene.add
      .text(0, 0, String(count), {
        fontFamily: 'Georgia, serif', fontSize: isBoss ? '40px' : '30px', fontStyle: 'bold',
        color: '#ffd7cf', stroke: '#3a120b', strokeThickness: 6,
      })
      .setOrigin(0.5)
      .setDepth(642);
    if (isBoss) {
      this.crown = scene.add.text(0, 0, '☠', { fontSize: '26px', color: '#ffd7cf' }).setOrigin(0.5).setDepth(642);
    }
    this.sync(true);
  }

  /* Lane x for this block's side at its current depth (so you steer to align under it). */
  get centerX() {
    const half = laneHalfWidth(this.y);
    if (this.side === 'L') return LANE.centerX - half * 0.40;
    if (this.side === 'R') return LANE.centerX + half * 0.40;
    return LANE.centerX;
  }

  slot(i) {
    const golden = 2.399963;
    const r = (this.isBoss ? 11 : 9) * Math.sqrt(i);
    const a = i * golden;
    return { ox: Math.cos(a) * r, oy: Math.sin(a) * r * 0.5 };
  }

  sync(instant = false) {
    const cap = this.isBoss ? 90 : 70;
    const target = Math.min(this.count, cap);
    while (this.units.length < target) {
      const i = this.units.length;
      const s = this.scene.add.image(0, 0, 'foe').setOrigin(0.5, 0.9);
      s.slot = this.slot(i);
      s.bob = Math.random() * Math.PI * 2;
      if (this.isBoss) s.setTint(0xffc9b8);
      this.layer.add(s);
      this.units.push(s);
    }
    while (this.units.length > target) {
      const s = this.units.pop();
      if (instant) { s.destroy(); continue; }
      this.scene.tweens.add({ targets: s, scale: 0, alpha: 0, duration: 140, ease: 'Quad.in', onComplete: () => s.destroy() });
    }
    this.badge.setText(String(Math.max(0, Math.round(this.count))));
    this.bar.width = 116 * Phaser.Math.Clamp(this.count / this.maxCount, 0, 1);
  }

  /* Arrow hit-zone — wider for bigger blocks, so a huge wave outspans your spray and some
   * flank raiders always survive to contact (the boss can't be perfectly cleared). */
  get hitRowY() { return this.y - 30 * depthScale(this.y); }
  get hitHalfX() {
    const cnt = Math.min(this.count, this.isBoss ? 90 : 70);
    return (10 + 6.5 * Math.sqrt(cnt)) * depthScale(this.y) + 6;
  }

  /* An arrow kills `power` raiders (each costs hpPerEnemy hits). */
  takeHit(power) {
    if (this.dead) return;
    this.hp -= power;
    const newCount = Math.max(0, Math.ceil(this.hp / this.hpPerEnemy));
    if (newCount < this.count) this.count = newCount;
    this.sync();
    if (this.hp <= 0) { this.count = 0; this.dead = true; }
  }

  update(dt, scrollPx) {
    this.t += dt;
    this.y += scrollPx; // always advancing — no melee stop
    const cx = this.centerX;
    const baseSc = depthScale(this.y);
    for (const s of this.units) {
      s.bob += dt * 0.01;
      s.x = cx + s.slot.ox * baseSc;
      s.y = this.y + s.slot.oy * baseSc + Math.sin(s.bob) * 1.8;
      s.setScale(baseSc * (this.isBoss ? 1.18 : 1));
      s.setDepth(450 + s.y * 0.1);
    }
    const sc = baseSc * (this.isBoss ? 1.25 : 1);
    const topY = this.y - 60 * sc;
    const bsc = Phaser.Math.Clamp(sc, 0.7, 1.3);
    this.barBg.setPosition(cx, topY).setScale(bsc);
    this.bar.setPosition(cx - 58 * bsc, topY).setScale(bsc, 1);
    this.badge.setPosition(cx, topY - 24).setScale(Phaser.Math.Clamp(sc, 0.7, 1.2));
    if (this.crown) this.crown.setPosition(cx, topY - 50);
  }

  get reachedCrowd() { return this.y >= LANE.crowdY - 6; }

  destroy() {
    this.layer.destroy();
    this.barBg.destroy();
    this.bar.destroy();
    this.badge.destroy();
    if (this.crown) this.crown.destroy();
  }
}


/* ===== entities/Pickup.js ===== */
/*
 * Pickup.js — Gold chests and crystals along the lane (Mali's wealth theme). Collected
 * by steering the crowd over them; gold adds score, crystals add the premium currency.
 * Both give a tiny crowd bonus so grabbing them feels rewarding, not just cosmetic.
 */



class Pickup {
  constructor(scene, kind, side) {
    this.scene = scene;
    this.kind = kind; // 'gold' | 'crystal'
    this.y = -30;
    // Offset to a flank-ish lane position so the player must steer to grab it.
    const half = laneHalfWidth(LANE.crowdY);
    this.laneOffset = (side === 'L' ? -1 : 1) * half * 0.45;
    this.sprite = scene.add.image(0, 0, kind === 'gold' ? 'chest' : 'crystal').setOrigin(0.5, 0.85).setDepth(360);
    this.spark = Juice.sparkle(scene, 0, 0, kind === 'gold' ? PALETTE.goldLight : PALETTE.crystal);
    this.collected = false;
    this.done = false;
  }

  update(dt, scrollPx, crowd) {
    this.y += scrollPx;
    const sc = depthScale(this.y);
    const half = laneHalfWidth(this.y);
    const x = LANE.centerX + (this.laneOffset / laneHalfWidth(LANE.crowdY)) * half;
    this.sprite.setPosition(x, this.y).setScale(sc).setDepth(360 + this.y * 0.1);
    if (this.spark) this.spark.setPosition(x, this.y - 14 * sc);

    if (!this.collected && Math.abs(this.y - LANE.crowdY) < 26 && Math.abs(x - crowd.centerX) < 40) {
      this.collect(x);
    }
    if (this.y > LANE.baseY + 80) this.done = true;
  }

  collect(x) {
    this.collected = true;
    if (this.kind === 'gold') {
      this.scene.addGold(25);
      crowdBonus(this.scene, 2);
      Juice.popText(this.scene, x, this.y - 30, '+25 Gold', '#ffe9a8', 24);
      Juice.burst(this.scene, x, this.y, PALETTE.goldLight, 16, 200);
    } else {
      this.scene.addCrystals(1);
      crowdBonus(this.scene, 3);
      Juice.popText(this.scene, x, this.y - 30, '+1 Crystal', '#bff4ff', 24);
      Juice.burst(this.scene, x, this.y, PALETTE.crystal, 16, 200);
    }
    if (this.spark) { const sp = this.spark; sp.stop(); this.scene.time.delayedCall(600, () => sp.destroy()); this.spark = null; }
    this.scene.tweens.add({
      targets: this.sprite, y: this.y - 40, alpha: 0, scale: this.sprite.scaleX * 1.4,
      duration: 300, onComplete: () => { this.sprite.destroy(); this.done = true; },
    });
  }

  destroy() {
    this.sprite.destroy();
    if (this.spark) this.spark.destroy();
  }
}

function crowdBonus(scene, n) {
  if (scene.crowd) { scene.crowd.count += n; scene.crowd.sync(); }
}


/* ===== scenes/BootScene.js ===== */
/*
 * BootScene — generates all procedural textures, sets up shared game state (gold,
 * crystals, unlocked levels, persisted to localStorage), then hands off to the map.
 */



const SAVE_KEY = 'bxmb_save_v1';

class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  create() {
    buildTextures(this);

    // Global, cross-scene state lives on the registry.
    const saved = loadSave();
    this.registry.set('gold', saved.gold);
    this.registry.set('crystals', saved.crystals);
    this.registry.set('unlocked', saved.unlocked); // index of highest unlocked level
    this.registry.set('sfx', makeSfx());
    this.registry.set('save', save);

    this.scene.start('Map');
  }
}

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      return { gold: s.gold || 0, crystals: s.crystals || 0, unlocked: s.unlocked || 0 };
    }
  } catch (e) {}
  return { gold: 0, crystals: 0, unlocked: 0 };
}

function save(registry) {
  try {
    localStorage.setItem(
      SAVE_KEY,
      JSON.stringify({
        gold: registry.get('gold'),
        crystals: registry.get('crystals'),
        unlocked: registry.get('unlocked'),
      })
    );
  } catch (e) {}
}


/* ===== scenes/MapScene.js ===== */
/*
 * MapScene — Chapter-1 world map. A parchment-style map of the Mali heartland with
 * three nodes (medallions) connected by a dotted caravan route. Unlocked nodes glow
 * gold; locked ones show a padlock. Tapping a node selects it; the gold PLAY button
 * launches the battle. Beating a level unlocks the next (handled in ResultScene).
 */



class MapScene extends Phaser.Scene {
  constructor() { super('Map'); }

  create() {
    const unlocked = this.registry.get('unlocked');
    this.selected = Math.min(unlocked, CHAPTER1.levels.length - 1);

    this._paintParchment();

    // Title plate
    this.add.rectangle(GAME_W / 2, 56, GAME_W - 40, 78, PALETTE.ink, 0.82).setStrokeStyle(3, PALETTE.gold);
    this.add.text(GAME_W / 2, 40, CHAPTER1.subtitle.toUpperCase(), {
      fontFamily: 'Georgia, serif', fontSize: '14px', color: hex(PALETTE.goldLight), letterSpacing: 3,
    }).setOrigin(0.5);
    this.add.text(GAME_W / 2, 64, CHAPTER1.title, {
      fontFamily: 'Georgia, serif', fontSize: '24px', fontStyle: 'bold', color: '#fff',
    }).setOrigin(0.5);

    // Anchor banner
    this.add.text(GAME_W / 2, 104, `Black Excellence · Multiplier Battle  —  Anchor: ${CHAPTER1.anchor}`, {
      fontFamily: 'Georgia, serif', fontSize: '12px', color: hex(PALETTE.goldDeep),
    }).setOrigin(0.5);

    // Currency HUD
    this._currency();

    // Node layout along a winding route.
    const pts = [
      { x: GAME_W * 0.30, y: GAME_H * 0.66 },
      { x: GAME_W * 0.64, y: GAME_H * 0.52 },
      { x: GAME_W * 0.42, y: GAME_H * 0.34 },
    ];
    this._route(pts);

    this.nodes = [];
    CHAPTER1.levels.forEach((lvl, i) => {
      const locked = i > unlocked;
      this.nodes.push(this._node(pts[i], i, lvl, locked));
    });

    this._infoPanel();
    this._playButton();
    this._museumLink();

    // Build-version badge (bump to v4, v5… next time).
    this.add.text(12, GAME_H - 16, VERSION, {
      fontFamily: 'Georgia, serif', fontSize: '13px', fontStyle: 'bold',
      color: hex(PALETTE.goldDeep), backgroundColor: 'rgba(42,28,12,0.35)', padding: { x: 5, y: 2 },
    }).setOrigin(0, 1).setDepth(50);

    this._refresh();
  }

  _paintParchment() {
    const g = this.add.graphics().setDepth(0);
    g.fillStyle(PALETTE.parchment, 1);
    g.fillRect(0, 0, GAME_W, GAME_H);
    // mottled sand patches
    for (let i = 0; i < 80; i++) {
      const x = Phaser.Math.Between(0, GAME_W), y = Phaser.Math.Between(120, GAME_H);
      g.fillStyle(0xdcc187, Phaser.Math.FloatBetween(0.15, 0.4));
      g.fillCircle(x, y, Phaser.Math.Between(8, 30));
    }
    // a stylized river (Niger bend) in faded blue
    g.lineStyle(10, 0x8fb6c9, 0.5);
    g.beginPath();
    g.moveTo(-10, GAME_H * 0.8);
    g.lineTo(GAME_W * 0.35, GAME_H * 0.74);
    g.lineTo(GAME_W * 0.55, GAME_H * 0.58);
    g.lineTo(GAME_W * 0.5, GAME_H * 0.4);
    g.lineTo(GAME_W * 0.7, GAME_H * 0.28);
    g.strokePath();
    // border frame
    g.lineStyle(6, PALETTE.goldDeep, 0.9);
    g.strokeRect(8, 122, GAME_W - 16, GAME_H - 200);
  }

  _route(pts) {
    const g = this.add.graphics().setDepth(5);
    g.fillStyle(PALETTE.ink, 0.55);
    for (let s = 0; s < pts.length - 1; s++) {
      const a = pts[s], b = pts[s + 1];
      const steps = 14;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        g.fillCircle(Phaser.Math.Linear(a.x, b.x, t), Phaser.Math.Linear(a.y, b.y, t), 2.2);
      }
    }
  }

  _node(pt, i, lvl, locked) {
    const c = this.add.container(pt.x, pt.y).setDepth(10);
    const ring = this.add.circle(0, 0, 30, locked ? 0x6b5a3a : PALETTE.gold).setStrokeStyle(4, PALETTE.ink);
    const inner = this.add.circle(0, 0, 22, locked ? 0x8a7550 : PALETTE.goldDeep);
    const label = this.add.text(0, 0, locked ? '🔒' : String(i + 1), {
      fontFamily: 'Georgia, serif', fontSize: locked ? '22px' : '26px', fontStyle: 'bold', color: '#fff',
    }).setOrigin(0.5);
    const name = this.add.text(0, 42, lvl.name, {
      fontFamily: 'Georgia, serif', fontSize: '11px', color: hex(PALETTE.ink), align: 'center',
      backgroundColor: 'rgba(233,211,163,0.7)', padding: { x: 4, y: 2 },
    }).setOrigin(0.5);
    c.add([ring, inner, label, name]);
    c.ring = ring; c.locked = locked; c.index = i;

    if (!locked) {
      this.tweens.add({ targets: ring, scale: 1.08, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.inOut' });
      const hit = this.add.circle(pt.x, pt.y, 36).setInteractive({ useHandCursor: true });
      hit.on('pointerdown', () => { this.selected = i; this._refresh(); this.registry.get('sfx')('gate'); });
    }
    return c;
  }

  _refresh() {
    this.nodes.forEach((n) => {
      const sel = n.index === this.selected;
      n.ring.setStrokeStyle(sel ? 5 : 4, sel ? PALETTE.crystal : PALETTE.ink);
    });
    const lvl = CHAPTER1.levels[this.selected];
    this.infoName.setText(lvl.name);
    this.infoBlurb.setText(lvl.blurb);
    this.infoStats.setText(`Start: ${lvl.startCrowd} soldier${lvl.startCrowd === 1 ? '' : 's'}   ·   Boss: ${lvl.boss.count}`);
  }

  _infoPanel() {
    const y = GAME_H - 158;
    this.add.rectangle(GAME_W / 2, y, GAME_W - 28, 84, PALETTE.ink, 0.86).setStrokeStyle(2, PALETTE.gold).setDepth(20);
    this.infoName = this.add.text(GAME_W / 2, y - 26, '', {
      fontFamily: 'Georgia, serif', fontSize: '17px', fontStyle: 'bold', color: hex(PALETTE.goldLight),
    }).setOrigin(0.5).setDepth(21);
    this.infoBlurb = this.add.text(GAME_W / 2, y - 2, '', {
      fontFamily: 'Georgia, serif', fontSize: '12px', color: '#eadfca', align: 'center',
      wordWrap: { width: GAME_W - 56 },
    }).setOrigin(0.5).setDepth(21);
    this.infoStats = this.add.text(GAME_W / 2, y + 26, '', {
      fontFamily: 'Georgia, serif', fontSize: '12px', color: hex(PALETTE.crystal),
    }).setOrigin(0.5).setDepth(21);
  }

  _playButton() {
    const y = GAME_H - 70;
    const btn = this.add.container(GAME_W / 2, y).setDepth(30);
    const bg = this.add.rectangle(0, 0, 220, 58, PALETTE.gold).setStrokeStyle(4, PALETTE.goldDeep);
    const sh = this.add.rectangle(0, 5, 220, 58, PALETTE.ink, 0.25).setDepth(-1);
    const txt = this.add.text(0, 0, '▶  PLAY', {
      fontFamily: 'Georgia, serif', fontSize: '26px', fontStyle: 'bold', color: hex(PALETTE.ink),
    }).setOrigin(0.5);
    btn.add([sh, bg, txt]);
    bg.setInteractive({ useHandCursor: true });
    bg.on('pointerover', () => btn.setScale(1.04));
    bg.on('pointerout', () => btn.setScale(1));
    bg.on('pointerdown', () => {
      this.registry.get('sfx')('weapon');
      this.cameras.main.fade(280, 20, 14, 6);
      this.time.delayedCall(280, () => this.scene.start('Battle', { levelIndex: this.selected }));
    });
    this.tweens.add({ targets: btn, scale: { from: 1, to: 1.03 }, duration: 700, yoyo: true, repeat: -1, ease: 'Sine.inOut' });
  }

  _currency() {
    const g = this.registry.get('gold'), c = this.registry.get('crystals');
    this.add.text(20, 128, `🪙 ${g}`, { fontFamily: 'Georgia, serif', fontSize: '16px', color: hex(PALETTE.goldDeep), fontStyle: 'bold' }).setDepth(40);
    this.add.text(GAME_W - 20, 128, `💎 ${c}`, { fontFamily: 'Georgia, serif', fontSize: '16px', color: hex(0x2a7d99), fontStyle: 'bold' }).setOrigin(1, 0).setDepth(40);
  }

  _museumLink() {
    const t = this.add.text(GAME_W / 2, GAME_H - 18, 'Black Achievement Digital Museum ↗', {
      fontFamily: 'Georgia, serif', fontSize: '11px', color: hex(0x2a7d99),
    }).setOrigin(0.5).setDepth(40).setInteractive({ useHandCursor: true });
    t.on('pointerdown', () => window.open(MUSEUM_URL, '_blank'));
  }
}


/* ===== scenes/BattleScene.js ===== */
/*
 * BattleScene — the core "archery march" loop.
 *
 * Flow: the lane scrolls toward a fixed crowd band of Mali archers. A distance-ordered
 * track streams down DESTRUCTIBLE REWARD BARRELS, enemy waves, and pickups. The player
 * drags to steer the whole crowd; the crowd auto-looses ARROW volleys (more units + higher
 * bow tier = more arrows, faster) at the nearest barrel. Shoot a barrel's HP to zero before
 * it reaches you → its reward (x10 / +25 / ARROWS+) grows the army. A barrel that reaches the
 * column alive smashes in and costs units. Enemy waves clash via attrition (rendered as
 * arrow volleys); a boss caps the level. Win = boss defeated; lose = crowd hits zero.
 *
 * Visual/feel work is delegated to Lane / Crowd / Barrel / EnemyFormation / Pickup / Juice
 * so this scene stays a readable orchestrator.
 */









class BattleScene extends Phaser.Scene {
  constructor() { super('Battle'); }

  create(data) {
    this.levelIndex = data.levelIndex || 0;
    this.level = CHAPTER1.levels[this.levelIndex];
    this.sfx = this.registry.get('sfx');

    this.dist = 0;
    this.trackPtr = 0;
    this.bossSpawned = false;
    this.over = false;
    this.goldEarned = 0;
    this.crystalsEarned = 0;
    this.barrels = [];
    this.enemies = [];
    this.pickups = [];
    this.arrows = [];
    this.fireTimer = 9999; // ready to fire the instant a target appears

    this.lane = new Lane(this);
    this.crowd = new Crowd(this, this.level.startCrowd);

    this._hud();
    this._input();
    this._banner('GET READY', PALETTE.goldLight);

    // brief lead-in before things stream
    this.startDelay = 700;
  }

  /* ---- input: drag (touch + mouse) steers the whole crowd ---- */
  _input() {
    this.input.on('pointerdown', (p) => { this.dragging = true; this.crowd.setTargetX(p.x); });
    this.input.on('pointermove', (p) => { if (this.dragging || p.isDown) this.crowd.setTargetX(p.x); });
    this.input.on('pointerup', () => { this.dragging = false; });
  }

  /* ---- HUD: top-center threat counter, progress, currency, bow tier ---- */
  _hud() {
    this.add.rectangle(GAME_W / 2, 26, GAME_W, 52, PALETTE.ink, 0.55).setDepth(800).setScrollFactor(0);

    this.threatBg = this.add.circle(GAME_W / 2, 30, 26, PALETTE.enemy, 0.9).setStrokeStyle(3, 0x3a120b).setDepth(801);
    this.threatTxt = this.add.text(GAME_W / 2, 30, '—', {
      fontFamily: 'Georgia, serif', fontSize: '26px', fontStyle: 'bold', color: '#fff',
      stroke: '#3a120b', strokeThickness: 4,
    }).setOrigin(0.5).setDepth(802);
    this.add.text(GAME_W / 2, 56, 'ENEMIES', { fontFamily: 'Georgia, serif', fontSize: '9px', color: '#ffd7cf' }).setOrigin(0.5).setDepth(802);

    this.armyTxt = this.add.text(14, 18, '🪖 1', { fontFamily: 'Georgia, serif', fontSize: '18px', fontStyle: 'bold', color: hex(PALETTE.goldLight) }).setDepth(802);
    this.weaponTxt = this.add.text(14, 40, '🏹 1 ARROW', { fontFamily: 'Georgia, serif', fontSize: '11px', fontStyle: 'bold', color: hex(PALETTE.crystal) }).setDepth(802);

    this.goldTxt = this.add.text(GAME_W - 14, 16, `🪙 ${this.registry.get('gold')}`, { fontFamily: 'Georgia, serif', fontSize: '14px', color: hex(PALETTE.goldLight) }).setOrigin(1, 0).setDepth(802);
    this.crysTxt = this.add.text(GAME_W - 14, 36, `💎 ${this.registry.get('crystals')}`, { fontFamily: 'Georgia, serif', fontSize: '14px', color: hex(0xbff4ff) }).setOrigin(1, 0).setDepth(802);

    this.add.rectangle(GAME_W / 2, GAME_H - 8, GAME_W - 24, 8, 0x000000, 0.4).setDepth(800);
    this.progBar = this.add.rectangle(12, GAME_H - 8, 2, 8, PALETTE.gold).setOrigin(0, 0.5).setDepth(801);

    const back = this.add.text(GAME_W - 14, GAME_H - 26, '⏏ Map', { fontFamily: 'Georgia, serif', fontSize: '13px', color: '#fff', backgroundColor: 'rgba(42,28,12,0.6)', padding: { x: 6, y: 3 } })
      .setOrigin(1, 1).setDepth(805).setInteractive({ useHandCursor: true });
    back.on('pointerdown', () => this.scene.start('Map'));
  }

  addGold(n) { this.goldEarned += n; this.registry.set('gold', this.registry.get('gold') + n); this.goldTxt.setText(`🪙 ${this.registry.get('gold')}`); this.sfx('coin'); }
  addCrystals(n) { this.crystalsEarned += n; this.registry.set('crystals', this.registry.get('crystals') + n); this.crysTxt.setText(`💎 ${this.registry.get('crystals')}`); this.sfx('coin'); }

  _banner(text, color, sub) {
    const c = this.add.container(GAME_W / 2, GAME_H * 0.4).setDepth(870);
    const t = this.add.text(0, 0, text, { fontFamily: 'Georgia, serif', fontSize: '46px', fontStyle: 'bold', color: hex(color), stroke: '#2a1c0c', strokeThickness: 7 }).setOrigin(0.5);
    c.add(t);
    if (sub) c.add(this.add.text(0, 40, sub, { fontFamily: 'Georgia, serif', fontSize: '16px', color: '#fff', stroke: '#2a1c0c', strokeThickness: 4 }).setOrigin(0.5));
    c.setScale(0.4); c.setAlpha(0);
    this.tweens.add({ targets: c, alpha: 1, scale: 1, duration: 280, ease: 'Back.out' });
    this.tweens.add({ targets: c, alpha: 0, scale: 1.3, duration: 360, delay: 900, ease: 'Quad.in', onComplete: () => c.destroy() });
  }

  /* ---- spawn from the track as the lane advances ---- */
  _spawnUpTo(dist) {
    const tr = this.level.track;
    while (this.trackPtr < tr.length && tr[this.trackPtr].dist <= dist) {
      const e = tr[this.trackPtr++];
      if (e.type === 'barrels') {
        for (const it of e.items) this.barrels.push(new Barrel(this, it.side, it.hp, it.reward));
      } else if (e.type === 'encounter') {
        // Barrel CHOICE near + its counter-wave TELEGRAPHED far up the lane (perspective-small),
        // so the player reads the incoming count/shape before committing crowd vs weapon.
        const bl = new Barrel(this, 'L', e.left.hp, e.left.reward);
        const br = new Barrel(this, 'R', e.right.hp, e.right.reward);
        bl.sibling = br; br.sibling = bl; // breaking one dismisses the other (exclusive choice)
        this.barrels.push(bl, br);
        const w = e.wave;
        this._spawnWave(w.count, w.label || 'Raiders', w.side || 'C', w.shape || 'mixed', -60 - (w.gap || BALANCE.telegraphGap));
      } else if (e.type === 'enemy') {
        this._spawnWave(e.count, e.label, e.side || 'C', e.shape || 'mixed', -60);
      } else if (e.type === 'pickup') {
        this.pickups.push(new Pickup(this, e.kind, e.side));
      }
    }
    if (!this.bossSpawned && dist >= this.level.length) {
      this.bossSpawned = true;
      const b = this.level.boss;
      // Boss = one large dense block (out-DPS it with aligned fire or get overrun).
      this.enemies.push(new EnemyFormation(this, b.count, b.name, true, 'C', -60));
      this._banner('FINAL STAND', PALETTE.enemy, b.name);
      this.sfx('clash');
    }
  }

  /* A wave streams down as small CLUSTERS. SHAPE drives which upgrade counters it:
   *  - 'wide'  → clusters side-by-side across L/C/R at the same depth: a wall you must SWEEP /
   *               cover with a big crowd (more soldiers = more arrows per cluster).
   *  - 'deep'  → clusters stacked on ONE side: a column you align under and grind down with
   *               sustained DPS (fire RATE / rapid).
   *  - 'mixed' → spread across sides AND depth (the general case).
   * Clusters you can't cover slip through and cost units 1-for-1 on contact. */
  _spawnWave(total, label, baseSide, shape, y0base) {
    const sz = BALANCE.enemyClusterSize;
    const n = Math.max(1, Math.round(total / sz));
    const sides = baseSide === 'L' ? ['L', 'C', 'R'] : baseSide === 'R' ? ['R', 'C', 'L'] : ['C', 'L', 'R'];
    let remaining = total;
    for (let i = 0; i < n; i++) {
      const c = i === n - 1 ? remaining : Math.min(sz, remaining);
      remaining -= c;
      if (c <= 0) break;
      let side, y0;
      if (shape === 'wide') {
        side = ['L', 'C', 'R'][i % 3];
        y0 = y0base - Math.floor(i / 3) * 130; // rows of three across the lane
      } else if (shape === 'deep') {
        side = baseSide === 'C' ? 'C' : baseSide;
        y0 = y0base - i * 95; // a tight deep column on one lane
      } else {
        side = sides[i % sides.length];
        y0 = y0base - i * 120;
      }
      this.enemies.push(new EnemyFormation(this, c, label, false, side, y0));
    }
    this.sfx('clash');
  }

  /* ---- archery (v3): arrows fly STRAIGHT UP from the crowd; hits are by x-overlap only ---- */
  _anyTargetAhead() {
    const inZone = (o) => o.y > LANE.topY - 10 && o.y < LANE.crowdY - 6;
    return this.barrels.some((b) => !b.dead && !b.done && inZone(b)) ||
      this.enemies.some((e) => !e.dead && inZone(e));
  }

  /* v4 DPS = unitCount × spread × fireRate. Each unit looses `spread` arrows/volley; rapid
   * tiers divide the interval. Beyond the sprite cap, arrows carry extra hit-power so DPS holds. */
  _fireParams() {
    const f = BALANCE.fire, c = this.crowd.count, spread = this.crowd.spread, rt = this.crowd.rateTier;
    const interval = Phaser.Math.Clamp(f.baseInterval / (1 + f.rateStepMul * rt), f.minInterval, f.baseInterval);
    const desired = Math.max(1, Math.round(c * spread));
    const arrows = Math.min(desired, f.arrowsMaxVisual);
    const hitPower = Math.max(1, Math.round(desired / arrows));
    return { interval, arrows, hitPower };
  }

  /* The crowd's arrow-spray half-width (absolute px at the crowd row). Small armies fire a
   * tight column (precise alignment matters); big armies fan out WIDE — so a large crowd can
   * blanket a wide wall of enemies (bodies = coverage), which is the point of the wide shape. */
  _crowdBandHalf() {
    return Phaser.Math.Clamp(14 + 1.9 * Math.sqrt(this.crowd.count), 14, 88);
  }

  _loose(n, hitPower) {
    this.sfx('twang');
    const tint = this.crowd.weaponColor();
    const band = this._crowdBandHalf();
    for (let i = 0; i < n; i++) {
      // Spray across the crowd band with a CENTER-WEIGHTED (triangular) spread — denser under
      // the crowd's middle, thinning to the edges — then fire dead straight up.
      const x = this.crowd.centerX + (Math.random() - Math.random()) * band;
      const a = this.add.image(x, LANE.crowdY - 16, 'arrow').setDepth(600).setTint(tint);
      a.vy = -BALANCE.arrow.speed;
      a.prevY = a.y;
      a.hitPower = hitPower;
      a.life = BALANCE.arrow.lifespanMs;
      this.arrows.push(a);
    }
    while (this.arrows.length > 260) { const old = this.arrows.shift(); old.destroy(); }
  }

  _updateArrows(dt) {
    const step = dt / 1000;
    for (let i = this.arrows.length - 1; i >= 0; i--) {
      const a = this.arrows[i];
      a.life -= dt;
      a.prevY = a.y;
      a.y += a.vy * step; // straight up; x never changes — alignment is everything
      a.setScale(Phaser.Math.Clamp(depthScale(a.y) * 1.2, 0.55, 1.35));

      // Overlap hit: did this arrow cross a live target's row within its x-width?
      let hit = false;
      for (const b of this.barrels) {
        if (b.dead || b.done) continue;
        const row = b.hitRowY;
        if (a.prevY >= row && a.y <= row && Math.abs(a.x - b.x) <= b.hitHalfX) {
          for (let h = 0; h < (a.hitPower || 1); h++) b.hit();
          if (Math.random() < 0.25) this.sfx('thunk');
          hit = true;
          break;
        }
      }
      if (!hit) {
        for (const e of this.enemies) {
          if (e.dead) continue;
          const row = e.hitRowY;
          if (a.prevY >= row && a.y <= row && Math.abs(a.x - e.centerX) <= e.hitHalfX) {
            e.takeHit(a.hitPower || 1);
            Juice.burst(this, a.x, row, PALETTE.enemy, 3, 90);
            if (Math.random() < 0.18) this.sfx('hit');
            hit = true;
            break;
          }
        }
      }
      if (hit) { a.destroy(); this.arrows.splice(i, 1); continue; }
      if (a.y < LANE.topY - 40 || a.life <= 0) { a.destroy(); this.arrows.splice(i, 1); }
    }
  }

  /* ---- resolve barrels that broke (reward) or reached the crowd (chip) ---- */
  _updateBarrels(dt, flow) {
    for (let i = this.barrels.length - 1; i >= 0; i--) {
      const b = this.barrels[i];
      if (b.done) { this.barrels.splice(i, 1); continue; } // dismissed sibling (fading out)
      b.update(dt, flow * BALANCE.barrelSpeedMul);

      if (b.dead && !b.rewarded) {
        b.rewarded = true;
        if (b.sibling && !b.sibling.dead && !b.sibling.done) b.sibling.dismiss(); // exclusive choice
        this.crowd.applyOp(b.reward, b.x, b.y); // multiply pop + particles + sfx
        Juice.burst(this, b.x, b.y, PALETTE.goldLight, 22, 260);
        Juice.flash(this, 0xffe9a8, 80, 0.22);
        Juice.shake(this, 0.005, 130);
        this.sfx('smash');
        b.destroy(); this.barrels.splice(i, 1); continue;
      }
      if (!b.dead && b.reachedCrowd) {
        const dmg = Math.max(1, Math.ceil(b.hp * BALANCE.barrelReachDmg));
        this.crowd.takeLosses(dmg);
        Juice.popText(this, b.x, LANE.crowdY - 30, `-${dmg}`, '#ff8d7a', 26);
        Juice.burst(this, b.x, LANE.crowdY - 18, 0x8a5a2a, 16, 200);
        Juice.shake(this, 0.007, 160);
        this.sfx('smash');
        b.destroy(); this.barrels.splice(i, 1); continue;
      }
    }
  }

  /* ---- enemies: advance, get shot down by arrows; survivors collide 1-for-1 ---- */
  _updateEnemies(dt, flow) {
    for (let i = this.enemies.length - 1; i >= 0; i--) {
      const e = this.enemies[i];
      e.update(dt, flow * BALANCE.enemySpeedMul);

      if (e.dead) {
        // Whole wave shot down before reaching the column.
        Juice.burst(this, e.centerX, e.y, PALETTE.goldLight, e.isBoss ? 30 : 18, 260);
        Juice.flash(this, 0xffe9a8, 80, 0.22);
        Juice.shake(this, e.isBoss ? 0.008 : 0.004, 150);
        this.sfx('pop');
        this.addGold(e.isBoss ? 60 : 12);
        const wasBoss = e.isBoss;
        e.destroy(); this.enemies.splice(i, 1);
        if (wasBoss) this._win();
        continue;
      }
      if (e.reachedCrowd) {
        // Survivors crash in and remove an EQUAL number of your units (1-for-1).
        const survivors = Math.round(e.count);
        this.crowd.takeLosses(survivors);
        Juice.popText(this, e.centerX, LANE.crowdY - 34, `-${survivors}`, '#ff8d7a', 30);
        Juice.burst(this, e.centerX, LANE.crowdY - 16, PALETTE.enemy, 22, 240);
        Juice.flash(this, 0x9a3326, 110, 0.3);
        Juice.shake(this, 0.01, 220);
        this.sfx('smash');
        const wasBoss = e.isBoss;
        e.destroy(); this.enemies.splice(i, 1);
        if (this.crowd.count <= 0) { this._lose(); return; }
        if (wasBoss) this._win(); // withstood the boss → victory
      }
    }
  }

  _updateThreat() {
    const live = this.enemies.filter((e) => !e.dead);
    if (live.length) {
      const total = live.reduce((s, e) => s + Math.round(e.count), 0);
      this.threatTxt.setText(String(total)); // remaining raiders in the current wave
      this.threatBg.setFillStyle(live.some((e) => e.isBoss) ? 0x6a1f14 : PALETTE.enemy, 0.95);
    } else {
      this.threatTxt.setText('—');
    }
    this.armyTxt.setText(`🪖 ${Math.round(this.crowd.count)}`);
    this.weaponTxt.setText(`🏹 ${this.crowd.weaponLabel()}`).setColor(hex(this.crowd.weaponColor()));
  }

  _win() {
    if (this.over) return;
    this.over = true;
    this.sfx('win');
    const cur = this.registry.get('unlocked');
    if (this.levelIndex + 1 > cur && this.levelIndex + 1 < CHAPTER1.levels.length) this.registry.set('unlocked', this.levelIndex + 1);
    this.crystalsEarned += 3; this.registry.set('crystals', this.registry.get('crystals') + 3);
    this.registry.get('save')(this.registry);
    this.time.delayedCall(700, () => this.scene.start('Result', {
      win: true, levelIndex: this.levelIndex, gold: this.goldEarned, crystals: this.crystalsEarned, army: Math.round(this.crowd.count),
    }));
  }

  _lose() {
    if (this.over) return;
    this.over = true;
    this.sfx('lose');
    Juice.shake(this, 0.012, 360);
    Juice.flash(this, 0x9a3326, 200, 0.4);
    this.time.delayedCall(700, () => this.scene.start('Result', { win: false, levelIndex: this.levelIndex, gold: this.goldEarned, crystals: this.crystalsEarned }));
  }

  update(time, delta) {
    if (this.over) { this.crowd.update(delta); this._updateArrows(delta); return; }

    if (this.startDelay > 0) {
      this.startDelay -= delta;
      this.crowd.update(delta);
      this.lane.update(delta, 0);
      return;
    }

    // v3: the lane flows steadily — enemies and barrels both keep advancing (no melee stop).
    // Per-level pace ramp: later levels flow faster (less reaction/aim time). Barrels AND
    // enemies scale together, so the telegraph keeps a constant gap.
    const flow = BALANCE.scrollSpeed * (this.level.speedMul || 1) * (delta / 1000);

    this.dist += flow;
    this._spawnUpTo(this.dist);

    this.lane.update(delta, flow);
    this.crowd.update(delta);

    this._updateBarrels(delta, flow);
    for (let i = this.pickups.length - 1; i >= 0; i--) { const p = this.pickups[i]; p.update(delta, flow, this.crowd); if (p.done) { p.destroy(); this.pickups.splice(i, 1); } }

    // Archery (v3): loose straight-up volleys whenever a barrel OR enemy is on the lane ahead.
    // Whether they connect is purely about steering the crowd under the target.
    if (this._anyTargetAhead()) {
      this.fireTimer += delta;
      const fp = this._fireParams();
      if (this.fireTimer >= fp.interval) { this.fireTimer = 0; this._loose(fp.arrows, fp.hitPower); }
    } else {
      this.fireTimer = 9999;
    }
    this._updateArrows(delta);

    this._updateEnemies(delta, flow); // shoot them down; survivors collide 1-for-1
    this._updateThreat();

    const prog = Phaser.Math.Clamp(this.dist / (this.level.length + 400), 0, 1);
    this.progBar.width = Math.max(2, (GAME_W - 24) * prog);

    if (this.crowd.count <= 0 && !this.over) this._lose();
  }
}


/* ===== scenes/ResultScene.js ===== */
/*
 * ResultScene — Victory and Defeat.
 *
 * Victory: a winged gold-and-blue "VICTORY" banner, three reward tiles
 * (+Workers / +Crystals / +Dossier), and the Mansa Musa DOSSIER card with an accurate
 * historical blurb + a "Read more" deep-link to the live museum. Continue returns to map.
 * Defeat: a somber banner + Retry / Map.
 */



class ResultScene extends Phaser.Scene {
  constructor() { super('Result'); }

  create(data) {
    this.data2 = data;
    this.add.rectangle(GAME_W / 2, GAME_H / 2, GAME_W, GAME_H, PALETTE.ink, 0.78).setDepth(0);
    if (data.win) this._victory(data); else this._defeat(data);
  }

  _victory(data) {
    this.sfxConfetti();
    // Winged banner
    const cx = GAME_W / 2, by = 130;
    const g = this.add.graphics().setDepth(5);
    // wings (gold)
    g.fillStyle(PALETTE.gold, 1);
    for (const dir of [-1, 1]) {
      g.beginPath();
      g.moveTo(cx + dir * 70, by);
      g.lineTo(cx + dir * 170, by - 34);
      g.lineTo(cx + dir * 150, by - 6);
      g.lineTo(cx + dir * 188, by - 2);
      g.lineTo(cx + dir * 150, by + 18);
      g.lineTo(cx + dir * 175, by + 26);
      g.lineTo(cx + dir * 78, by + 22);
      g.closePath();
      g.fillPath();
    }
    g.fillStyle(PALETTE.goldDeep, 1);
    for (const dir of [-1, 1]) {
      g.fillTriangle(cx + dir * 78, by - 4, cx + dir * 150, by - 6, cx + dir * 120, by + 14);
    }
    // central blue shield plate
    g.fillStyle(PALETTE.victoryBlue, 1);
    g.fillRoundedRect(cx - 92, by - 38, 184, 76, 12);
    g.lineStyle(4, PALETTE.goldLight, 1);
    g.strokeRoundedRect(cx - 92, by - 38, 184, 76, 12);

    const v = this.add.text(cx, by - 4, 'VICTORY', {
      fontFamily: 'Georgia, serif', fontSize: '34px', fontStyle: 'bold', color: hex(PALETTE.goldLight), stroke: '#1d3a5c', strokeThickness: 5,
    }).setOrigin(0.5).setDepth(6);
    this.add.text(cx, by + 24, CHAPTER1.levels[data.levelIndex].name, { fontFamily: 'Georgia, serif', fontSize: '12px', color: '#dfe9ff' }).setOrigin(0.5).setDepth(6);
    this.tweens.add({ targets: v, scale: { from: 0.4, to: 1 }, duration: 420, ease: 'Back.out' });

    // Reward tiles
    const tiles = [
      { label: '+Workers', val: `${Math.max(data.army || 0, data.gold)}`, color: PALETTE.gold, icon: '🛡' },
      { label: '+Crystals', val: `${data.crystals}`, color: PALETTE.crystal, icon: '💎' },
      { label: '+Dossier', val: '1', color: PALETTE.green, icon: '📜' },
    ];
    tiles.forEach((t, i) => this._tile(GAME_W / 2 + (i - 1) * 130, 230, t, i));

    // Dossier card
    this._dossierCard(GAME_W / 2, 470);

    // Continue
    this._button(GAME_W / 2, GAME_H - 54, '▶  CONTINUE', PALETTE.gold, () => this.scene.start('Map'));
  }

  _tile(x, y, t, i) {
    const c = this.add.container(x, y).setDepth(10).setScale(0);
    c.add(this.add.rectangle(0, 0, 116, 96, PALETTE.ink, 0.9).setStrokeStyle(3, t.color));
    c.add(this.add.text(0, -28, t.icon, { fontSize: '26px' }).setOrigin(0.5));
    c.add(this.add.text(0, 6, t.val, { fontFamily: 'Georgia, serif', fontSize: '26px', fontStyle: 'bold', color: hex(t.color) }).setOrigin(0.5));
    c.add(this.add.text(0, 34, t.label, { fontFamily: 'Georgia, serif', fontSize: '12px', color: '#eadfca' }).setOrigin(0.5));
    this.tweens.add({ targets: c, scale: 1, duration: 320, delay: 200 + i * 140, ease: 'Back.out' });
  }

  _dossierCard(x, y) {
    const c = this.add.container(x, y).setDepth(10).setAlpha(0);
    const w = GAME_W - 44, h = 250;
    c.add(this.add.rectangle(0, 0, w, h, PALETTE.parchment, 1).setStrokeStyle(4, PALETTE.goldDeep));
    c.add(this.add.rectangle(0, -h / 2 + 18, w, 36, PALETTE.victoryBlue, 1));
    c.add(this.add.text(0, -h / 2 + 18, 'DOSSIER UNLOCKED', { fontFamily: 'Georgia, serif', fontSize: '14px', fontStyle: 'bold', color: hex(PALETTE.goldLight), letterSpacing: 2 }).setOrigin(0.5));
    c.add(this.add.text(0, -h / 2 + 50, DOSSIER.name, { fontFamily: 'Georgia, serif', fontSize: '22px', fontStyle: 'bold', color: hex(PALETTE.ink) }).setOrigin(0.5));
    c.add(this.add.text(0, -h / 2 + 72, DOSSIER.era, { fontFamily: 'Georgia, serif', fontSize: '11px', color: hex(PALETTE.goldDeep) }).setOrigin(0.5));

    const body = DOSSIER.facts.slice(0, 3).map((f) => '•  ' + f).join('\n\n');
    c.add(this.add.text(-w / 2 + 16, -h / 2 + 92, body, {
      fontFamily: 'Georgia, serif', fontSize: '11.5px', color: hex(PALETTE.ink), lineSpacing: 2,
      wordWrap: { width: w - 32 },
    }).setOrigin(0, 0));

    // Read more link
    const link = this.add.text(0, h / 2 - 18, 'Read more at the Black Achievement Museum ↗', {
      fontFamily: 'Georgia, serif', fontSize: '12px', fontStyle: 'bold', color: hex(0x1c6c86),
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    link.on('pointerdown', () => window.open(DOSSIER.source, '_blank'));
    c.add(link);

    this.tweens.add({ targets: c, alpha: 1, y: y, duration: 400, delay: 700, ease: 'Quad.out' });
    this.tweens.add({ targets: c, scale: { from: 0.9, to: 1 }, duration: 400, delay: 700, ease: 'Back.out' });
  }

  _defeat(data) {
    const cx = GAME_W / 2;
    const t = this.add.text(cx, 200, 'DEFEAT', {
      fontFamily: 'Georgia, serif', fontSize: '50px', fontStyle: 'bold', color: hex(PALETTE.enemy), stroke: '#1a0a06', strokeThickness: 7,
    }).setOrigin(0.5);
    this.tweens.add({ targets: t, scale: { from: 1.4, to: 1 }, duration: 420, ease: 'Bounce.out' });
    this.add.text(cx, 256, 'The column was overrun. Steer through richer gates\nand build a bigger army before the clash.', {
      fontFamily: 'Georgia, serif', fontSize: '14px', color: '#eadfca', align: 'center', lineSpacing: 4,
    }).setOrigin(0.5);
    this.add.text(cx, 330, `Gold banked this run: 🪙 ${data.gold}`, { fontFamily: 'Georgia, serif', fontSize: '14px', color: hex(PALETTE.goldLight) }).setOrigin(0.5);

    this._button(cx, GAME_H - 130, '↻  RETRY', PALETTE.gold, () => this.scene.start('Battle', { levelIndex: data.levelIndex }));
    this._button(cx, GAME_H - 60, '⏏  WORLD MAP', PALETTE.green, () => this.scene.start('Map'));
  }

  _button(x, y, label, color, cb) {
    const c = this.add.container(x, y).setDepth(20);
    const bg = this.add.rectangle(0, 0, 240, 56, color).setStrokeStyle(4, PALETTE.ink);
    const txt = this.add.text(0, 0, label, { fontFamily: 'Georgia, serif', fontSize: '22px', fontStyle: 'bold', color: hex(PALETTE.ink) }).setOrigin(0.5);
    c.add([bg, txt]);
    bg.setInteractive({ useHandCursor: true });
    bg.on('pointerover', () => c.setScale(1.04));
    bg.on('pointerout', () => c.setScale(1));
    bg.on('pointerdown', () => { this.registry.get('sfx')('gate'); cb(); });
    this.tweens.add({ targets: c, scale: { from: 0.9, to: 1 }, duration: 300, delay: 300, ease: 'Back.out' });
    return c;
  }

  sfxConfetti() {
    for (let i = 0; i < 40; i++) {
      const x = Phaser.Math.Between(0, GAME_W);
      const col = Phaser.Utils.Array.GetRandom([PALETTE.gold, PALETTE.goldLight, PALETTE.victoryBlue, PALETTE.crystal]);
      const s = this.add.image(x, -10, 'shard').setTint(col).setDepth(40).setScale(Phaser.Math.FloatBetween(1, 2.4));
      this.tweens.add({
        targets: s, y: GAME_H + 20, x: x + Phaser.Math.Between(-40, 40), angle: Phaser.Math.Between(0, 360),
        duration: Phaser.Math.Between(1400, 2600), delay: Phaser.Math.Between(0, 600), ease: 'Quad.in',
        onComplete: () => s.destroy(),
      });
    }
  }
}


/* ===== main.js ===== */
/*
 * main.js — Phaser bootstrap. Loads the scene graph and starts the game in a mobile
 * portrait canvas that FIT-scales to any screen. Phaser itself is loaded as a global
 * from the CDN in index.html (this file is an ES module that reads window.Phaser).
 */






const config = {
  type: Phaser.AUTO,
  parent: 'game',
  backgroundColor: '#' + PALETTE.skyTop.toString(16),
  width: GAME_W,
  height: GAME_H,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  render: { antialias: true, roundPixels: false },
  scene: [BootScene, MapScene, BattleScene, ResultScene],
};

// eslint-disable-next-line no-new
window.game = new Phaser.Game(config);

// Remove the loading splash once Phaser is up.
const splash = document.getElementById('splash');
if (splash) splash.style.display = 'none';


})();
</script>

    // Friendly fallback if the CDN is blocked.
    window.addEventListener('load', function () {
      setTimeout(function () {
        if (!window.Phaser) {
          document.getElementById('splash').innerHTML =
            '<div class="crest">⚠️</div><h1>Could not load the game engine</h1>' +
            '<div class="sub">Check your connection and reload.</div>';
        }
      }, 4000);
    });
  </script>
