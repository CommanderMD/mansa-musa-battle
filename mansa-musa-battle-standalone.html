/* ===== systems/juice.js ===== */
/*
 * juice.js ŌĆö Tiny reusable "game feel" helpers: screen shake, hit flash, particle
 * bursts, gold sparkle, and floating pop text. Scenes call these; they own no state.
 */


const Juice = {
  shake(scene, intensity = 0.006, dur = 150) {
    scene.cameras.main.shake(dur, intensity);
  },

  flash(scene, color = 0xffffff, dur = 90, alpha = 0.5) {
    scene.cameras.main.flash(dur, (color >> 16) & 255, (color >> 8) & 255, color & 255, false, null, alpha);
  },

  /* A short outward burst of `n` particles in `color`. */
  burst(scene, x, y, color = PALETTE.gold, n = 12, spd = 160) {
    const e = scene.add.particles(x, y, 'spark', {
      speed: { min: spd * 0.4, max: spd },
      angle: { min: 0, max: 360 },
      scale: { start: 0.7, end: 0 },
      alpha: { start: 1, end: 0 },
      lifespan: { min: 250, max: 520 },
      quantity: n,
      tint: color,
      blendMode: 'ADD',
      emitting: false,
    });
    e.setDepth(900);
    e.explode(n);
    scene.time.delayedCall(700, () => e.destroy());
    return e;
  },

  /* Persistent gentle sparkle (e.g. on a chest or the crowd when huge). */
  sparkle(scene, x, y, color = PALETTE.goldLight) {
    const e = scene.add.particles(x, y, 'spark', {
      speed: { min: 6, max: 24 },
      scale: { start: 0.35, end: 0 },
      alpha: { start: 0.9, end: 0 },
      lifespan: 600,
      frequency: 120,
      tint: color,
      blendMode: 'ADD',
    });
    e.setDepth(890);
    return e;
  },

  /* Floating text that rises and fades ŌĆö for "x2", "+10", "-5", combat numbers. */
  popText(scene, x, y, text, color = '#ffffff', size = 30) {
    const t = scene.add.text(x, y, text, {
      fontFamily: 'Georgia, "Times New Roman", serif',
      fontSize: size + 'px',
      fontStyle: 'bold',
      color,
      stroke: '#2a1c0c',
      strokeThickness: 5,
    });
    t.setOrigin(0.5).setDepth(950).setScale(0.2);
    scene.tweens.add({ targets: t, scale: 1, duration: 180, ease: 'Back.out' });
    scene.tweens.add({
      targets: t,
      y: y - 70,
      alpha: 0,
      duration: 900,
      delay: 160,
      ease: 'Cubic.in',
      onComplete: () => t.destroy(),
    });
    return t;
  },

  /* A scale "punch" on any game object ŌĆö the satisfying multiply pop. */
  punch(scene, obj, amt = 1.25, dur = 160) {
    const sx = obj.scaleX, sy = obj.scaleY;
    scene.tweens.add({
      targets: obj,
      scaleX: sx * amt,
      scaleY: sy * amt,
      duration: dur * 0.4,
      yoyo: true,
      ease: 'Quad.out',
      onComplete: () => obj.setScale(sx, sy),
    });
  },
};


/* ===== systems/audio.js ===== */
/*
 * audio.js ŌĆö Zero-asset sound via the Web Audio API. Returns a single sfx(name) fn so
 * scenes can call this.sfx('pop'). Synthesized blips keep the build self-contained;
 * swap for sampled audio later if desired. Audio context unlocks on first user gesture.
 */
function makeSfx() {
  let ctx = null;
  const ensure = () => {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { ctx = null; }
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
    return ctx;
  };

  function tone(freq, dur, type = 'sine', gain = 0.12, slideTo = null) {
    const c = ensure();
    if (!c) return;
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, c.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, c.currentTime + dur);
    g.gain.setValueAtTime(gain, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    o.connect(g).connect(c.destination);
    o.start();
    o.stop(c.currentTime + dur + 0.02);
  }

  const fns = {
    pop: () => tone(440, 0.16, 'triangle', 0.16, 880),
    weapon: () => { tone(330, 0.12, 'square', 0.1); setTimeout(() => tone(660, 0.16, 'square', 0.1), 70); },
    clash: () => tone(120, 0.1, 'sawtooth', 0.14, 70),
    hit: () => tone(200, 0.07, 'square', 0.08, 120),
    coin: () => tone(880, 0.1, 'sine', 0.12, 1320),
    win: () => { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 0.22, 'triangle', 0.14), i * 110)); },
    lose: () => { [440, 330, 220].forEach((f, i) => setTimeout(() => tone(f, 0.28, 'sawtooth', 0.12), i * 130)); },
    gate: () => tone(520, 0.08, 'sine', 0.07, 720),
  };

  return (name) => { try { (fns[name] || (() => {}))(); } catch (e) {} };
}


/* ===== systems/textures.js ===== */
/*
 * textures.js ŌĆö All placeholder art is generated procedurally at boot so the build
 * stays self-contained (no binary assets to ship to Workers static hosting).
 *
 * Readable silhouettes are the priority: player = blue-robed figure with a gold cap,

function figure(g, bodyColor, trimColor, capColor) {

  g.clear();
  g.fillStyle(0x000000, 0.18);
  g.fillEllipse(14, 38, 20, 7); // ground shadow

  g.fillStyle(bodyColor, 1);
  g.fillTriangle(14, 14, 4, 36, 24, 36);
  g.fillRect(8, 20, 12, 16);
  // trim sash
  g.fillStyle(trimColor, 1);
  g.fillRect(8, 26, 12, 3);
  // head
  g.fillStyle(0x6b4a2a, 1);
  g.fillCircle(14, 11, 6);
  // cap
  g.fillStyle(capColor, 1);
  g.fillEllipse(14, 7, 13, 7);
  g.fillRect(8, 6, 12, 3);
}

/* ===== systems/Lane.js ===== */
/*
 * Lane.js ŌĆö The painted 2.5D backdrop: warm sky, a receding trapezoid road with a
 * vanishing point near the horizon, desert sand + green flanks, and scrolling props
 * (acacia trees, dunes) that stream down and scale with perspective to fake depth.
 *
 * This is the "2.5D" of the brief: flat art + perspective scaling + a painted lane ŌĆö
 * NOT top-down, NOT real 3D.
 */


class Lane {
  constructor(scene) {
    this.scene = scene;
    this.props = [];
    this.spawnAccum = 0;
    this._paintStatic();
  }

  _paintStatic() {
    const s = this.scene;
    const g = s.add.graphics().setDepth(0);

    // Sky gradient (banded fills ŌĆö warm gold to pale).
    const bands = 10;
    for (let i = 0; i < bands; i++) {
      const t = i / (bands - 1);
      const c = Phaser.Display.Color.Interpolate.ColorWithColor(
        Phaser.Display.Color.ValueToColor(PALETTE.skyTop),
        Phaser.Display.Color.ValueToColor(PALETTE.sky),
        bands - 1,
        i
      );
      g.fillStyle(Phaser.Display.Color.GetColor(c.r, c.g, c.b), 1);
      g.fillRect(0, (LANE.topY * t) | 0, GAME_W, Math.ceil(LANE.topY / bands) + 1);
    }
    // Sun disc near the horizon.
    g.fillStyle(0xfff0c0, 0.85);
    g.fillCircle(GAME_W / 2, LANE.topY - 30, 46);
    g.fillStyle(0xffe49a, 0.5);
    g.fillCircle(GAME_W / 2, LANE.topY - 30, 64);

    // Ground: split desert (sand) flanks + green near the road.
    g.fillStyle(PALETTE.sand, 1);
    g.fillRect(0, LANE.topY, GAME_W, GAME_H - LANE.topY);
    // green band closer to viewer (savanna)
    g.fillStyle(PALETTE.green, 0.35);
    g.fillTriangle(0, GAME_H, 0, GAME_H - 360, GAME_W, GAME_H);
    g.fillTriangle(GAME_W, GAME_H, GAME_W, GAME_H - 360, 0, GAME_H);

    // The road trapezoid (vanishing at top).
    const cx = LANE.centerX;
    g.fillStyle(PALETTE.roadEdge, 1);
    g.fillPoints(
      [
        { x: cx - LANE.topHalfW - 8, y: LANE.topY },
        { x: cx + LANE.topHalfW + 8, y: LANE.topY },
        { x: cx + LANE.baseHalfW + 14, y: GAME_H },
        { x: cx - LANE.baseHalfW - 14, y: GAME_H },
      ],
      true
    );
    g.fillStyle(PALETTE.road, 1);
    g.fillPoints(
      [
        { x: cx - LANE.topHalfW, y: LANE.topY },
        { x: cx + LANE.topHalfW, y: LANE.topY },
        { x: cx + LANE.baseHalfW, y: GAME_H },
        { x: cx - LANE.baseHalfW, y: GAME_H },
      ],
      true
    );

    // Dashed center line for a sense of motion reference.
    g.fillStyle(PALETTE.goldLight, 0.45);
    for (let i = 0; i < 9; i++) {
      const t0 = i / 9, t1 = t0 + 0.045;
      const y0 = Phaser.Math.Linear(LANE.topY, GAME_H, t0);
      const y1 = Phaser.Math.Linear(LANE.topY, GAME_H, t1);
      const w0 = Phaser.Math.Linear(2, 9, t0);
      const w1 = Phaser.Math.Linear(2, 9, t1);
      g.fillPoints(
        [
          { x: cx - w0, y: y0 }, { x: cx + w0, y: y0 },
          { x: cx + w1, y: y1 }, { x: cx - w1, y: y1 },
        ],
        true
      );
    }
    this.staticG = g;

    // Soft vignette to focus the eye.
    const v = s.add.graphics().setDepth(820);
    v.fillStyle(0x2a1c0c, 0.0);
    v.fillStyle(0x000000, 0.16);
    v.fillRect(0, 0, GAME_W, 60);
    v.fillRect(0, GAME_H - 90, GAME_W, 90);
    this.vignette = v;
  }

  /* Spawn a flank prop just past the road edge at the horizon; it scrolls toward us. */
  _spawnProp() {
    const left = Math.random() < 0.5;
    const kind = Math.random() < 0.5 ? 'tree' : 'dune';
    const p = this.scene.add.image(0, LANE.topY + 4, kind).setOrigin(0.5, 0.95).setDepth(50);
    p.side = left ? -1 : 1;
    p.spread = Phaser.Math.FloatBetween(1.15, 2.2); // how far off-road
    this.props.push(p);
  }

  update(dt, scrollPx) {
    // Trickle in props.
    this.spawnAccum += scrollPx;
    if (this.spawnAccum > 70) { this.spawnAccum = 0; this._spawnProp(); }

    for (let i = this.props.length - 1; i >= 0; i--) {
      const p = this.props[i];
      p.y += scrollPx;
      const sc = depthScale(p.y);
      const t = Phaser.Math.Clamp((p.y - LANE.topY) / (GAME_H - LANE.topY), 0, 1);
      const roadHalf = Phaser.Math.Linear(LANE.topHalfW, LANE.baseHalfW, t);
      p.x = LANE.centerX + p.side * (roadHalf + p.spread * 60 * sc);
      p.setScale(sc * 1.4).setDepth(50 + p.y * 0.1);
      if (p.y > GAME_H + 60) { p.destroy(); this.props.splice(i, 1); }
    }
  }
}


/* ===== entities/Crowd.js ===== */
/*
 * Crowd.js ŌĆö The player's marching column. Owns the logical unit `count`, the visible
 * unit sprites (capped at BALANCE.renderCap), formation packing, steering, the bobbing
 * march animation, weapon tier, and the grow/shrink "pop".
 *
 * The crowd holds a fixed band on screen (LANE.crowdY); the world scrolls past it.
 * Steering only changes centerX. depthScale handles the 2.5D up-close sizing.
 */



class Crowd {
  constructor(scene, count) {
    this.scene = scene;
    this.count = count;
    this.centerX = LANE.centerX;
    this.targetX = LANE.centerX;
    this.weaponTier = 0;
    this.units = []; // sprite pool
    this.t = 0; // time accumulator for bob

    this.layer = scene.add.container(0, 0).setDepth(500);

    // Count badge that floats above the blob.
    this.badge = scene.add
      .text(this.centerX, LANE.crowdY - 64, String(count), {
        fontFamily: 'Georgia, serif',
        fontSize: '34px',
        fontStyle: 'bold',
        color: '#ffffff',
        stroke: '#1d3a5c',
        strokeThickness: 6,
      })
      .setOrigin(0.5)
      .setDepth(700);

    this.sync(true);
  }

  /* Persistent in-blob offset for unit i. Spiral packing keeps it tidy as it grows. */
  slot(i) {
    const golden = 2.399963; // golden angle ŌåÆ even disk packing
    const r = 9 * Math.sqrt(i);
    const a = i * golden;
    return { ox: Math.cos(a) * r, oy: Math.sin(a) * r * 0.55 };
  }

  /* Reconcile sprite pool with logical count (capped), animating pops. */
  sync(instant = false) {
    const target = Math.min(this.count, BALANCE.renderCap);
    while (this.units.length < target) {
      const i = this.units.length;
      const s = this.scene.add.image(0, 0, 'unit').setOrigin(0.5, 0.9);
      s.slot = this.slot(i);
      s.bob = Math.random() * Math.PI * 2;
      this.layer.add(s);
      this.units.push(s);
      if (!instant) {
        s.setScale(0.1);
        this.scene.tweens.add({ targets: s, scale: 1, duration: 220, ease: 'Back.out' });
      }
    }
    while (this.units.length > target) {
      const s = this.units.pop();
      if (instant) { s.destroy(); continue; }
      this.scene.tweens.add({
        targets: s, scale: 0, alpha: 0, duration: 200, ease: 'Quad.in',
        onComplete: () => s.destroy(),
      });
    }
    this.badge.setText(String(Math.max(0, Math.round(this.count))));
  }

  setTargetX(x) {
    const hw = laneHalfWidth(LANE.crowdY) - 26;
    this.targetX = Phaser.Math.Clamp(x, LANE.centerX - hw, LANE.centerX + hw);
  }

  get alive() { return this.count > 0; }

  /* Apply a gate operation and play the juice. Returns the new count. */
  applyOp(op, x, y) {
    const before = this.count;
    if (op.op === 'add') this.count += op.v;
    else if (op.op === 'sub') this.count = Math.max(0, this.count - op.v);
    else if (op.op === 'mul') this.count = Math.round(this.count * op.v);
    else if (op.op === 'weapon') this.upgradeWeapon();

    const good = this.count >= before && op.op !== 'sub';
    if (op.op !== 'weapon') {
      const label = op.op === 'add' ? `+${op.v}` : op.op === 'sub' ? `-${op.v}` : `x${op.v}`;
      Juice.popText(this.scene, x, y - 30, label, good ? '#ffe9a8' : '#ff8d7a', 38);
    }
    if (good && op.op !== 'weapon') {
      Juice.burst(this.scene, this.centerX, LANE.crowdY - 20, PALETTE.goldLight, 18, 220);
      Juice.flash(this.scene, 0xffe9a8, 80, 0.25);
      Juice.punch(this.scene, this.badge, 1.5);
      this.scene.sfx && this.scene.sfx('pop');
    } else if (op.op === 'sub') {
      Juice.burst(this.scene, this.centerX, LANE.crowdY - 20, 0xff6b52, 14, 200);
      Juice.shake(this.scene, 0.004, 120);
    }
    this.sync();
    return this.count;
  }

  upgradeWeapon() {
    this.weaponTier = Math.min(BALANCE.weaponTiers.length - 1, this.weaponTier + 1);
    const w = BALANCE.weaponTiers[this.weaponTier];
    Juice.popText(this.scene, this.centerX, LANE.crowdY - 70, `${w.name}!`, '#9be8ff', 30);
    Juice.burst(this.scene, this.centerX, LANE.crowdY - 20, w.color, 22, 260);
    Juice.flash(this.scene, w.color, 110, 0.3);
    this.scene.sfx && this.scene.sfx('weapon');
  }

  /* Remove n units (combat losses) with a poof. */
  takeLosses(n) {
    this.count = Math.max(0, this.count - n);
    this.sync();
    if (this.count > 0) Juice.shake(this.scene, 0.003, 90);
  }

  update(dt) {
    this.t += dt;
    this.centerX = Phaser.Math.Linear(this.centerX, this.targetX, BALANCE.steerLerp);
    const sc = depthScale(LANE.crowdY);
    for (const s of this.units) {
      s.bob += dt * 0.012;
      const bob = Math.sin(s.bob) * 2.2;
      s.x = this.centerX + s.slot.ox * sc;
      s.y = LANE.crowdY + s.slot.oy * sc + bob;
      s.setScale(sc);
      s.setDepth(500 + s.y * 0.1);
    }
    this.badge.x = this.centerX;
    this.badge.y = LANE.crowdY - 58 - Math.min(40, Math.sqrt(this.count) * 4);
  }

  destroy() {
    this.layer.destroy();
    this.badge.destroy();
  }
}


/* ===== entities/Gate.js ===== */
/*
 * Gate.js ŌĆö A row of two multiplier gates (left + right) the crowd steers through.
 * Each side shows an operation banner (x2 / x3 / +10 / -5 / Weapon+). When the row
 * scrolls down past the crowd line, the side the crowd center is under is applied once.
 *
 * Drawn as a translucent colored archway that scales with perspective as it nears.
 */


const opColor = (op) => {
  if (op.op === 'sub') return PALETTE.enemy;
  if (op.op === 'weapon') return PALETTE.crystal;
  if (op.op === 'mul') return PALETTE.green;
  return PALETTE.gold; // add
};
const opLabel = (op) =>
  op.op === 'add' ? `+${op.v}` : op.op === 'sub' ? `-${op.v}` : op.op === 'mul' ? `x${op.v}` : 'WEAPON+';

class GateSide {
  constructor(scene, op) {
    this.op = op;
    this.color = opColor(op);
    this.g = scene.add.graphics().setDepth(300);
    this.label = scene.add
      .text(0, 0, opLabel(op), {
        fontFamily: 'Georgia, serif',
        fontSize: '30px',
        fontStyle: 'bold',
        color: '#ffffff',
        stroke: hex(PALETTE.ink),
        strokeThickness: 5,
        align: 'center',
        wordWrap: { width: 110 },
      })
      .setOrigin(0.5)
      .setDepth(320);
  }
  draw(cx, y, halfW, sc) {
    const w = halfW * 2 * 0.92;
    const h = 96 * sc;
    const x = cx - w / 2;
    const top = y - h;
    const g = this.g;
    g.clear();
    g.fillStyle(this.color, 0.22);
    g.fillRect(x, top, w, h);
    g.lineStyle(Math.max(2, 5 * sc), this.color, 0.95);
    g.strokeRect(x, top, w, h);
    // posts
    g.fillStyle(this.color, 0.9);
    g.fillRect(x - 4 * sc, top, 6 * sc, h);
    g.fillRect(x + w - 2 * sc, top, 6 * sc, h);
    this.label.setPosition(cx, top + h * 0.4).setScale(Phaser.Math.Clamp(sc, 0.7, 1.15));
  }
  destroy() { this.g.destroy(); this.label.destroy(); }
}

class GateRow {
  constructor(scene, data) {
    this.scene = scene;
    this.y = -40;
    this.left = new GateSide(scene, data.left);
    this.right = new GateSide(scene, data.right);
    this.applied = false;
    this.done = false;
  }

  update(dt, scrollPx, crowd) {
    this.y += scrollPx;
    const sc = depthScale(this.y);
    const half = laneHalfWidth(this.y);
    const leftCx = LANE.centerX - half / 2;
    const rightCx = LANE.centerX + half / 2;
    this.left.draw(leftCx, this.y, half / 2, sc);
    this.right.draw(rightCx, this.y, half / 2, sc);

    // Apply when the row sweeps through the crowd band.
    if (!this.applied && this.y >= LANE.crowdY - 6) {
      this.applied = true;
      const pick = crowd.centerX <= LANE.centerX ? this.left : this.right;
      const px = crowd.centerX <= LANE.centerX ? leftCx : rightCx;
      crowd.applyOp(pick.op, px, LANE.crowdY);
      // Fade the chosen side out, dim the other.
      this._fade(pick, true);
      this._fade(pick === this.left ? this.right : this.left, false);
    }

    if (this.y > LANE.baseY + 120) this.done = true;
  }

  _fade(side, chosen) {
    this.scene.tweens.add({
      targets: [side.g, side.label],
      alpha: 0,
      duration: chosen ? 320 : 180,
      onComplete: () => {},
    });
  }

  destroy() { this.left.destroy(); this.right.destroy(); }
}


/* ===== entities/EnemyFormation.js ===== */
/*
 * EnemyFormation.js ŌĆö A streaming-down enemy block (a wave, or the end boss). Owns a
 * logical `count` rendered as packed raider sprites + a floating health bar and a count
 * label. It marches down until it reaches the clash line, then the BattleScene resolves
 * attrition against the crowd. Boss formations are larger and visually flagged.
 */


class EnemyFormation {
  constructor(scene, count, label, isBoss = false) {
    this.scene = scene;
    this.count = count;
    this.maxCount = count;
    this.label = label || 'Raiders';
    this.isBoss = isBoss;
    this.y = -60;
    this.centerX = LANE.centerX + Phaser.Math.Between(-30, 30);
    this.units = [];
    this.clashing = false;
    this.dead = false;
    this.t = 0;

    this.layer = scene.add.container(0, 0).setDepth(450);

    // Health bar + count badge
    this.barBg = scene.add.rectangle(0, 0, 120, 12, 0x2a1c0c, 0.85).setOrigin(0.5).setDepth(640);
    this.bar = scene.add.rectangle(0, 0, 116, 8, PALETTE.enemy).setOrigin(0, 0.5).setDepth(641);
    this.badge = scene.add
      .text(0, 0, String(count), {
        fontFamily: 'Georgia, serif',
        fontSize: isBoss ? '40px' : '30px',
        fontStyle: 'bold',
        color: '#ffd7cf',
        stroke: '#3a120b',
        strokeThickness: 6,
      })
      .setOrigin(0.5)
      .setDepth(642);
    if (isBoss) {
      this.crown = scene.add
        .text(0, 0, 'ŌśĀ', { fontSize: '26px', color: '#ffd7cf' })
        .setOrigin(0.5)
        .setDepth(642);
    }
    this.sync(true);
  }

  slot(i) {
    const golden = 2.399963;
    const r = (this.isBoss ? 11 : 9) * Math.sqrt(i);
    const a = i * golden;
    return { ox: Math.cos(a) * r, oy: Math.sin(a) * r * 0.5 };
  }

  sync(instant = false) {
    const cap = this.isBoss ? 90 : 70;
    const target = Math.min(this.count, cap);
    while (this.units.length < target) {
      const i = this.units.length;
      const s = this.scene.add.image(0, 0, 'foe').setOrigin(0.5, 0.9);
      s.slot = this.slot(i);
      s.bob = Math.random() * Math.PI * 2;
      if (this.isBoss) s.setTint(0xffc9b8);
      this.layer.add(s);
      this.units.push(s);
    }
    while (this.units.length > target) {
      const s = this.units.pop();
      if (instant) { s.destroy(); continue; }
      this.scene.tweens.add({
        targets: s, scale: 0, alpha: 0, duration: 160, ease: 'Quad.in',
        onComplete: () => s.destroy(),
      });
    }
    this.badge.setText(String(Math.max(0, Math.round(this.count))));
    const pct = Phaser.Math.Clamp(this.count / this.maxCount, 0, 1);
    this.bar.width = 116 * pct;
  }

  takeDamage(n) {
    this.count = Math.max(0, this.count - n);
    this.sync();
    if (this.count <= 0) this.dead = true;
  }

  update(dt, scrollPx) {
    this.t += dt;
    if (!this.clashing) this.y += scrollPx;
    const sc = depthScale(this.y) * (this.isBoss ? 1.25 : 1);
    const baseSc = depthScale(this.y);
    for (const s of this.units) {
      s.bob += dt * 0.01;
      s.x = this.centerX + s.slot.ox * baseSc;
      s.y = this.y + s.slot.oy * baseSc + Math.sin(s.bob) * 1.8;
      s.setScale(baseSc * (this.isBoss ? 1.18 : 1));
      s.setDepth(450 + s.y * 0.1);
    }
    const topY = this.y - 60 * sc;
    this.barBg.setPosition(this.centerX, topY).setScale(Phaser.Math.Clamp(sc, 0.7, 1.3));
    this.bar.setPosition(this.centerX - 58 * Phaser.Math.Clamp(sc, 0.7, 1.3), topY).setScale(Phaser.Math.Clamp(sc, 0.7, 1.3), 1);
    this.badge.setPosition(this.centerX, topY - 24).setScale(Phaser.Math.Clamp(sc, 0.7, 1.2));
    if (this.crown) this.crown.setPosition(this.centerX, topY - 50);
  }

  get reachedClash() { return this.y >= LANE.clashLineY; }

  destroy() {
    this.layer.destroy();
    this.barBg.destroy();
    this.bar.destroy();
    this.badge.destroy();
    if (this.crown) this.crown.destroy();
  }
}


/* ===== entities/Pickup.js ===== */
/*
 * Pickup.js ŌĆö Gold chests and crystals along the lane (Mali's wealth theme). Collected
 * by steering the crowd over them; gold adds score, crystals add the premium currency.
 * Both give a tiny crowd bonus so grabbing them feels rewarding, not just cosmetic.
 */



class Pickup {
  constructor(scene, kind, side) {
    this.scene = scene;
    this.kind = kind; // 'gold' | 'crystal'
    this.y = -30;
    // Offset to a flank-ish lane position so the player must steer to grab it.
    const half = laneHalfWidth(LANE.crowdY);
    this.laneOffset = (side === 'L' ? -1 : 1) * half * 0.45;
    this.sprite = scene.add.image(0, 0, kind === 'gold' ? 'chest' : 'crystal').setOrigin(0.5, 0.85).setDepth(360);
    this.spark = Juice.sparkle(scene, 0, 0, kind === 'gold' ? PALETTE.goldLight : PALETTE.crystal);
    this.collected = false;
    this.done = false;
  }

  update(dt, scrollPx, crowd) {
    this.y += scrollPx;
    const sc = depthScale(this.y);
    const half = laneHalfWidth(this.y);
    const x = LANE.centerX + (this.laneOffset / laneHalfWidth(LANE.crowdY)) * half;
    this.sprite.setPosition(x, this.y).setScale(sc).setDepth(360 + this.y * 0.1);
    if (this.spark) this.spark.setPosition(x, this.y - 14 * sc);

    if (!this.collected && Math.abs(this.y - LANE.crowdY) < 26 && Math.abs(x - crowd.centerX) < 40) {
      this.collect(x);
    }
    if (this.y > LANE.baseY + 80) this.done = true;
  }

  collect(x) {
    this.collected = true;
    if (this.kind === 'gold') {
      this.scene.addGold(25);
      crowdBonus(this.scene, 2);
      Juice.popText(this.scene, x, this.y - 30, '+25 Gold', '#ffe9a8', 24);
      Juice.burst(this.scene, x, this.y, PALETTE.goldLight, 16, 200);
    } else {
      this.scene.addCrystals(1);
      crowdBonus(this.scene, 3);
      Juice.popText(this.scene, x, this.y - 30, '+1 Crystal', '#bff4ff', 24);
      Juice.burst(this.scene, x, this.y, PALETTE.crystal, 16, 200);
    }
    if (this.spark) { const sp = this.spark; sp.stop(); this.scene.time.delayedCall(600, () => sp.destroy()); this.spark = null; }
    this.scene.tweens.add({
      targets: this.sprite, y: this.y - 40, alpha: 0, scale: this.sprite.scaleX * 1.4,
      duration: 300, onComplete: () => { this.sprite.destroy(); this.done = true; },
    });
  }

  destroy() {
    this.sprite.destroy();
    if (this.spark) this.spark.destroy();
  }
}

function crowdBonus(scene, n) {
  if (scene.crowd) { scene.crowd.count += n; scene.crowd.sync(); }
}


/* ===== scenes/BootScene.js ===== */
/*
 * BootScene ŌĆö generates all procedural textures, sets up shared game state (gold,
 * crystals, unlocked levels, persisted to localStorage), then hands off to the map.
 */



const SAVE_KEY = 'bxmb_save_v1';

class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  create() {
    buildTextures(this);

    // Global, cross-scene state lives on the registry.
    const saved = loadSave();
    this.registry.set('gold', saved.gold);
    this.registry.set('crystals', saved.crystals);
    this.registry.set('unlocked', saved.unlocked); // index of highest unlocked level
    this.registry.set('sfx', makeSfx());
    this.registry.set('save', save);

    this.scene.start('Map');
  }
}

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      return { gold: s.gold || 0, crystals: s.crystals || 0, unlocked: s.unlocked || 0 };
    }
  } catch (e) {}
  return { gold: 0, crystals: 0, unlocked: 0 };
}

function save(registry) {
  try {
    localStorage.setItem(
      SAVE_KEY,
      JSON.stringify({
        gold: registry.get('gold'),
        crystals: registry.get('crystals'),
        unlocked: registry.get('unlocked'),
      })
    );
  } catch (e) {}
}


/* ===== scenes/MapScene.js ===== */
/*
 * MapScene ŌĆö Chapter-1 world map. A parchment-style map of the Mali heartland with
 * three nodes (medallions) connected by a dotted caravan route. Unlocked nodes glow
 * gold; locked ones show a padlock. Tapping a node selects it; the gold PLAY button
 * launches the battle. Beating a level unlocks the next (handled in ResultScene).
 */



class MapScene extends Phaser.Scene {
  constructor() { super('Map'); }

  create() {
    const unlocked = this.registry.get('unlocked');
    this.selected = Math.min(unlocked, CHAPTER1.levels.length - 1);

    this._paintParchment();

    // Title plate
    this.add.rectangle(GAME_W / 2, 56, GAME_W - 40, 78, PALETTE.ink, 0.82).setStrokeStyle(3, PALETTE.gold);
    this.add.text(GAME_W / 2, 40, CHAPTER1.subtitle.toUpperCase(), {
      fontFamily: 'Georgia, serif', fontSize: '14px', color: hex(PALETTE.goldLight), letterSpacing: 3,
    }).setOrigin(0.5);
    this.add.text(GAME_W / 2, 64, CHAPTER1.title, {
      fontFamily: 'Georgia, serif', fontSize: '24px', fontStyle: 'bold', color: '#fff',
    }).setOrigin(0.5);

    // Anchor banner
    this.add.text(GAME_W / 2, 104, `Black Excellence ┬Ę Multiplier Battle  ŌĆö  Anchor: ${CHAPTER1.anchor}`, {
      fontFamily: 'Georgia, serif', fontSize: '12px', color: hex(PALETTE.goldDeep),
    }).setOrigin(0.5);

    // Currency HUD
    this._currency();

    // Node layout along a winding route.
    const pts = [
      { x: GAME_W * 0.30, y: GAME_H * 0.66 },
      { x: GAME_W * 0.64, y: GAME_H * 0.52 },
      { x: GAME_W * 0.42, y: GAME_H * 0.34 },
    ];
    this._route(pts);

    this.nodes = [];
    CHAPTER1.levels.forEach((lvl, i) => {
      const locked = i > unlocked;
      this.nodes.push(this._node(pts[i], i, lvl, locked));
    });

    this._infoPanel();
    this._playButton();
    this._museumLink();

    this._refresh();
  }

  _paintParchment() {
    const g = this.add.graphics().setDepth(0);
    g.fillStyle(PALETTE.parchment, 1);
    g.fillRect(0, 0, GAME_W, GAME_H);
    // mottled sand patches

/* ===== scenes/BattleScene.js ===== */
/*
 * BattleScene ŌĆö the core "multiplier march" loop.
 *
 * Flow: the lane scrolls toward a fixed crowd band. A distance-ordered track streams
 * gate rows, enemy waves, and pickups down the lane. The player drags to steer the
 * whole crowd left/right; gates apply their op; enemy waves clash on contact via
 * attrition (crowd size x weapon tier vs enemy count). A boss caps the level and needs
 * a threshold crowd. Win = boss defeated; lose = crowd hits zero.
 *
 * Everything visual/feel-related is delegated to Lane / Crowd / Gate / EnemyFormation /
 * Pickup / Juice so this scene stays a readable orchestrator.
 */









class BattleScene extends Phaser.Scene {
  constructor() { super('Battle'); }

  create(data) {
    this.levelIndex = data.levelIndex || 0;
    this.level = CHAPTER1.levels[this.levelIndex];
    this.sfx = this.registry.get('sfx');

    this.dist = 0;
    this.trackPtr = 0;
    this.bossSpawned = false;
    this.over = false;
    this.goldEarned = 0;
    this.crystalsEarned = 0;
    this.gates = [];
    this.enemies = [];
    this.pickups = [];
    this.clashTimer = 0;

    this.lane = new Lane(this);
    this.crowd = new Crowd(this, this.level.startCrowd);

    this._hud();
    this._input();
    this._banner('GET READY', PALETTE.goldLight);

    // brief lead-in before things stream
    this.startDelay = 700;
  }

  /* ---- input: drag (touch + mouse) steers the whole crowd ---- */
  _input() {
    this.input.on('pointerdown', (p) => { this.dragging = true; this.crowd.setTargetX(p.x); });
    this.input.on('pointermove', (p) => { if (this.dragging || p.isDown) this.crowd.setTargetX(p.x); });
    this.input.on('pointerup', () => { this.dragging = false; });
  }

  /* ---- HUD: top-center threat counter (the "69"), progress, currency, weapon ---- */
  _hud() {
    this.add.rectangle(GAME_W / 2, 26, GAME_W, 52, PALETTE.ink, 0.55).setDepth(800).setScrollFactor(0);

    // Top-center enemy/threat counter
    this.threatBg = this.add.circle(GAME_W / 2, 30, 26, PALETTE.enemy, 0.9).setStrokeStyle(3, 0x3a120b).setDepth(801);
    this.threatTxt = this.add.text(GAME_W / 2, 30, 'ŌĆö', {
      fontFamily: 'Georgia, serif', fontSize: '26px', fontStyle: 'bold', color: '#fff',
      stroke: '#3a120b', strokeThickness: 4,
    }).setOrigin(0.5).setDepth(802);
    this.add.text(GAME_W / 2, 56, 'ENEMIES', { fontFamily: 'Georgia, serif', fontSize: '9px', color: '#ffd7cf' }).setOrigin(0.5).setDepth(802);

    // Left: army count
    this.armyTxt = this.add.text(14, 18, '­¤øĪ 8', { fontFamily: 'Georgia, serif', fontSize: '18px', fontStyle: 'bold', color: hex(PALETTE.goldLight) }).setDepth(802);
    this.weaponTxt = this.add.text(14, 40, 'Spears', { fontFamily: 'Georgia, serif', fontSize: '11px', color: hex(PALETTE.crystal) }).setDepth(802);

    // Right: currency
    this.goldTxt = this.add.text(GAME_W - 14, 16, `­¤¬Ö ${this.registry.get('gold')}`, { fontFamily: 'Georgia, serif', fontSize: '14px', color: hex(PALETTE.goldLight) }).setOrigin(1, 0).setDepth(802);
    this.crysTxt = this.add.text(GAME_W - 14, 36, `­¤ÆÄ ${this.registry.get('crystals')}`, { fontFamily: 'Georgia, serif', fontSize: '14px', color: hex(0xbff4ff) }).setOrigin(1, 0).setDepth(802);

    // Progress bar (bottom)
    this.add.rectangle(GAME_W / 2, GAME_H - 8, GAME_W - 24, 8, 0x000000, 0.4).setDepth(800);
    this.progBar = this.add.rectangle(12, GAME_H - 8, 2, 8, PALETTE.gold).setOrigin(0, 0.5).setDepth(801);

    // Pause / back
    const back = this.add.text(GAME_W - 14, GAME_H - 26, 'ŌÅÅ Map', { fontFamily: 'Georgia, serif', fontSize: '13px', color: '#fff', backgroundColor: 'rgba(42,28,12,0.6)', padding: { x: 6, y: 3 } })
      .setOrigin(1, 1).setDepth(805).setInteractive({ useHandCursor: true });
    back.on('pointerdown', () => this.scene.start('Map'));
  }

  addGold(n) { this.goldEarned += n; this.registry.set('gold', this.registry.get('gold') + n); this.goldTxt.setText(`­¤¬Ö ${this.registry.get('gold')}`); this.sfx('coin'); }
  addCrystals(n) { this.crystalsEarned += n; this.registry.set('crystals', this.registry.get('crystals') + n); this.crysTxt.setText(`­¤ÆÄ ${this.registry.get('crystals')}`); this.sfx('coin'); }

  _banner(text, color, sub) {
    const c = this.add.container(GAME_W / 2, GAME_H * 0.4).setDepth(870);
    const t = this.add.text(0, 0, text, { fontFamily: 'Georgia, serif', fontSize: '46px', fontStyle: 'bold', color: hex(color), stroke: '#2a1c0c', strokeThickness: 7 }).setOrigin(0.5);
    c.add(t);
    if (sub) c.add(this.add.text(0, 40, sub, { fontFamily: 'Georgia, serif', fontSize: '16px', color: '#fff', stroke: '#2a1c0c', strokeThickness: 4 }).setOrigin(0.5));
    c.setScale(0.4); c.setAlpha(0);
    this.tweens.add({ targets: c, alpha: 1, scale: 1, duration: 280, ease: 'Back.out' });
    this.tweens.add({ targets: c, alpha: 0, scale: 1.3, duration: 360, delay: 900, ease: 'Quad.in', onComplete: () => c.destroy() });
  }

  /* ---- spawn from the track as the lane advances ---- */
  _spawnUpTo(dist) {
    const tr = this.level.track;
    while (this.trackPtr < tr.length && tr[this.trackPtr].dist <= dist) {
      const e = tr[this.trackPtr++];
      if (e.type === 'gateRow') this.gates.push(new GateRow(this, e));
      else if (e.type === 'enemy') { this.enemies.push(new EnemyFormation(this, e.count, e.label, !!e.boss)); this.sfx('clash'); }
      else if (e.type === 'pickup') this.pickups.push(new Pickup(this, e.kind, e.side));
    }
    // Boss at the end of the level.
    if (!this.bossSpawned && dist >= this.level.length) {
      this.bossSpawned = true;
      const b = this.level.boss;
      this.enemies.push(new EnemyFormation(this, b.count, b.name, true));
      this._banner('FINAL STAND', PALETTE.enemy, b.name);
      this.sfx('clash');
    }
  }

  /* ---- the attrition clash against the front-most enemy at the line ---- */
  _resolveClash(dt) {
    const front = this.enemies.find((e) => !e.dead && e.reachedClash);
    if (!front) return;
    front.clashing = true;
    this.clashTimer += dt;
    if (this.clashTimer < BALANCE.clashTickMs) return;
    this.clashTimer = 0;

    const w = BALANCE.weaponTiers[this.crowd.weaponTier];
    const yourDmg = Math.max(1, Math.round(this.crowd.count * w.dmg));
    const enemyDmg = Math.max(1, Math.round(front.count * BALANCE.enemyDmgCoeff));

    // visuals: a volley from the crowd into the enemy block
    this._volley(this.crowd.centerX, LANE.crowdY - 24, front.centerX, front.y, w.color);
    Juice.burst(this, front.centerX, front.y, PALETTE.enemy, 8, 150);
    this.sfx('hit');

    front.takeDamage(yourDmg);
    this.crowd.takeLosses(enemyDmg);

    if (front.dead) {
      Juice.burst(this, front.centerX, front.y, PALETTE.goldLight, 26, 260);
      Juice.flash(this, 0xffe9a8, 90, 0.25);
      Juice.shake(this, 0.006, 160);
      this.sfx('pop');
      const reward = front.isBoss ? 60 : 15;
      this.addGold(reward);
      if (front.isBoss) this._win();
      front.destroy();
      this.enemies = this.enemies.filter((e) => e !== front);
    }
    if (this.crowd.count <= 0 && !this.over) this._lose();
  }

  _volley(x0, y0, x1, y1, color) {
    for (let i = 0; i < 4; i++) {
      const s = this.add.image(x0 + Phaser.Math.Between(-14, 14), y0, 'shard').setTint(color).setDepth(600).setScale(1.4);
      this.tweens.add({
        targets: s, x: x1 + Phaser.Math.Between(-16, 16), y: y1, duration: 110, ease: 'Quad.in',
        onComplete: () => s.destroy(),
      });
    }
  }

  _updateThreat() {
    const front = this.enemies.find((e) => !e.dead);
    if (front) {
      this.threatTxt.setText(String(Math.round(front.count)));
      this.threatBg.setFillStyle(front.isBoss ? 0x6a1f14 : PALETTE.enemy, 0.95);
    } else {
      this.threatTxt.setText('ŌĆö');
    }
    this.armyTxt.setText(`­¤øĪ ${Math.round(this.crowd.count)}`);
    this.weaponTxt.setText(BALANCE.weaponTiers[this.crowd.weaponTier].name);
  }

  _win() {
    if (this.over) return;
    this.over = true;
    this.sfx('win');
    // Unlock the next level.
    const cur = this.registry.get('unlocked');
    if (this.levelIndex + 1 > cur && this.levelIndex + 1 < CHAPTER1.levels.length) this.registry.set('unlocked', this.levelIndex + 1);
    this.registry.get('save')(this.registry);
    this.crystalsEarned += 3; this.registry.set('crystals', this.registry.get('crystals') + 3);
    this.registry.get('save')(this.registry);
    this.time.delayedCall(700, () => this.scene.start('Result', {
      win: true, levelIndex: this.levelIndex, gold: this.goldEarned, crystals: this.crystalsEarned, army: Math.round(this.crowd.count),
    }));
  }

  _lose() {
    if (this.over) return;
    this.over = true;
    this.sfx('lose');
    Juice.shake(this, 0.012, 360);
    Juice.flash(this, 0x9a3326, 200, 0.4);
    this.time.delayedCall(700, () => this.scene.start('Result', { win: false, levelIndex: this.levelIndex, gold: this.goldEarned, crystals: this.crystalsEarned }));
  }

  update(time, delta) {
    if (this.over) { this.crowd.update(delta); return; }

    if (this.startDelay > 0) {
      this.startDelay -= delta;
      this.crowd.update(delta);
      this.lane.update(delta, 0);
      return;
    }

    const scrollPx = BALANCE.scrollSpeed * (delta / 1000);
    // Halt forward scroll of the world while a clash is happening at the line.
    const clashing = this.enemies.some((e) => e.reachedClash && !e.dead);
    const flow = clashing ? 0 : scrollPx;

    this.dist += flow;
    this._spawnUpTo(this.dist);

    this.lane.update(delta, flow);
    this.crowd.update(delta);

    for (let i = this.gates.length - 1; i >= 0; i--) { const g = this.gates[i]; g.update(delta, flow, this.crowd); if (g.done) { g.destroy(); this.gates.splice(i, 1); } }
    for (let i = this.pickups.length - 1; i >= 0; i--) { const p = this.pickups[i]; p.update(delta, flow, this.crowd); if (p.done) { p.destroy(); this.pickups.splice(i, 1); } }
    for (const e of this.enemies) e.update(delta, flow);

    this._resolveClash(delta);
    this._updateThreat();

    // progress bar (cap until boss resolves)
    const prog = Phaser.Math.Clamp(this.dist / (this.level.length + 400), 0, 1);
    this.progBar.width = Math.max(2, (GAME_W - 24) * prog);

    // Lose if a gate zeroed the crowd outside combat.
    if (this.crowd.count <= 0 && !this.over) this._lose();
  }
}

      fontFamily: 'Georgia, serif', fontSize: '11.5px', color: hex(PALETTE.ink), lineSpacing: 2,
      wordWrap: { width: w - 32 },
    }).setOrigin(0, 0));

    // Read more link
    const link = this.add.text(0, h / 2 - 18, 'Read more at the Black Achievement Museum ŌåŚ', {
      fontFamily: 'Georgia, serif', fontSize: '12px', fontStyle: 'bold', color: hex(0x1c6c86),
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    link.on('pointerdown', () => window.open(DOSSIER.source, '_blank'));
    c.add(link);

    this.tweens.add({ targets: c, alpha: 1, y: y, duration: 400, delay: 700, ease: 'Quad.out' });
    this.tweens.add({ targets: c, scale: { from: 0.9, to: 1 }, duration: 400, delay: 700, ease: 'Back.out' });
  }

  _defeat(data) {
    const cx = GAME_W / 2;
    const t = this.add.text(cx, 200, 'DEFEAT', {
      fontFamily: 'Georgia, serif', fontSize: '50px', fontStyle: 'bold', color: hex(PALETTE.enemy), stroke: '#1a0a06', strokeThickness: 7,
    }).setOrigin(0.5);
    this.tweens.add({ targets: t, scale: { from: 1.4, to: 1 }, duration: 420, ease: 'Bounce.out' });
    this.add.text(cx, 256, 'The column was overrun. Steer through richer gates\nand build a bigger army before the clash.', {
      fontFamily: 'Georgia, serif', fontSize: '14px', color: '#eadfca', align: 'center', lineSpacing: 4,
    }).setOrigin(0.5);
    this.add.text(cx, 330, `Gold banked this run: ­¤¬Ö ${data.gold}`, { fontFamily: 'Georgia, serif', fontSize: '14px', color: hex(PALETTE.goldLight) }).setOrigin(0.5);

    this._button(cx, GAME_H - 130, 'Ōå╗  RETRY', PALETTE.gold, () => this.scene.start('Battle', { levelIndex: data.levelIndex }));
    this._button(cx, GAME_H - 60, 'ŌÅÅ  WORLD MAP', PALETTE.green, () => this.scene.start('Map'));
  }

  _button(x, y, label, color, cb) {
    const c = this.add.container(x, y).setDepth(20);
    const bg = this.add.rectangle(0, 0, 240, 56, color).setStrokeStyle(4, PALETTE.ink);
    const txt = this.add.text(0, 0, label, { fontFamily: 'Georgia, serif', fontSize: '22px', fontStyle: 'bold', color: hex(PALETTE.ink) }).setOrigin(0.5);
    c.add([bg, txt]);
    bg.setInteractive({ useHandCursor: true });
    bg.on('pointerover', () => c.setScale(1.04));
    bg.on('pointerout', () => c.setScale(1));
    bg.on('pointerdown', () => { this.registry.get('sfx')('gate'); cb(); });
    this.tweens.add({ targets: c, scale: { from: 0.9, to: 1 }, duration: 300, delay: 300, ease: 'Back.out' });
    return c;
  }

  sfxConfetti() {
    for (let i = 0; i < 40; i++) {
      const x = Phaser.Math.Between(0, GAME_W);
      const col = Phaser.Utils.Array.GetRandom([PALETTE.gold, PALETTE.goldLight, PALETTE.victoryBlue, PALETTE.crystal]);
      const s = this.add.image(x, -10, 'shard').setTint(col).setDepth(40).setScale(Phaser.Math.FloatBetween(1, 2.4));
      this.tweens.add({
        targets: s, y: GAME_H + 20, x: x + Phaser.Math.Between(-40, 40), angle: Phaser.Math.Between(0, 360),
        duration: Phaser.Math.Between(1400, 2600), delay: Phaser.Math.Between(0, 600), ease: 'Quad.in',
        onComplete: () => s.destroy(),
      });
    }
  }
}


/* ===== main.js ===== */
/*
 * main.js ŌĆö Phaser bootstrap. Loads the scene graph and starts the game in a mobile
 * portrait canvas that FIT-scales to any screen. Phaser itself is loaded as a global
 * from the CDN in index.html (this file is an ES module that reads window.Phaser).
 */






const config = {
  type: Phaser.AUTO,
  parent: 'game',
  backgroundColor: '#' + PALETTE.skyTop.toString(16),
  width: GAME_W,
  height: GAME_H,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  render: { antialias: true, roundPixels: false },
  scene: [BootScene, MapScene, BattleScene, ResultScene],
};

// eslint-disable-next-line no-new
window.game = new Phaser.Game(config);

// Remove the loading splash once Phaser is up.
const splash = document.getElementById('splash');
if (splash) splash.style.display = 'none';


})();
</script>
  <script>
    // Friendly fallback if the CDN is blocked.
    window.addEventListener('load', function () {
      setTimeout(function () {
        if (!window.Phaser) {
          document.getElementById('splash').innerHTML =
            '<div class="crest">ŌÜĀ’ĖÅ</div><h1>Could not load the game engine</h1>' +
            '<div class="sub">Check your connection and reload.</div>';
        }
      }, 4000);
    });
  </script>
